<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - Grade 1 - Chapter 17: Vowel Combinations</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fbe7c6,#f7f3e9,#f6c28b);
    overflow-x:hidden;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

#splash img{
    width:200px;
    animation:zoom 2s ease-in-out;
}

@keyframes zoom{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* Game Container */
#game{
    display:none;
    padding:20px;
    text-align:center;
}

/* Header (Grade + Chapter) */
#header{
    margin-bottom:10px;
    font-size:20px;
    font-weight:bold;
    color:#4b2e16;
}

/* Score */
#score{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Question Box */
.question-box{
    background:rgba(75,46,22,0.9);
    color:#fff;
    padding:18px;
    border-radius:18px;
    max-width:750px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    font-size:20px;
}

/* Options */
.option{
    display:block;
    margin:10px auto;
    padding:12px;
    width:85%;
    max-width:520px;
    background:#fffaf0;
    border:2px solid #8b5a2b;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
    background:#ffffff;
}

/* Correct / Wrong */
.correct{
    background:#b6f7b6 !important;
    border-color:green;
}

.wrong{
    background:#f7b6b6 !important;
    border-color:red;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- SPLASH with Innovine logo -->
<div id="splash">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="game">
    <div id="header">Grade 1 - Chapter 17: Vowel Combinations</div>
    <div id="score">Score: 0</div>

    <div class="question-box" id="question">Loading...</div>
    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// QUESTIONS (shuffled once at start)
let questions = [
{
    q:"A child is reading a story and finds a word where two vowels work together. Which word should the child choose?",
    o:[
        "cat",
        "rain",
        "sun",
        "pen"
    ],
    a:1
},
{
    q:"A child sees these words on different labels: soap, bag, hat, cup. Which word contains a vowel combination?",
    o:[
        "bag",
        "hat",
        "soap",
        "cup"
    ],
    a:2
},
{
    q:"Children are making a chart of words with vowel combinations. Which word should be added?",
    o:[
        "team",
        "cat",
        "dog",
        "sun"
    ],
    a:0
},
{
    q:"The teacher asks children to hold up a word with two vowels working together. Which card should be chosen?",
    o:[
        "boat",
        "pen",
        "bus",
        "hat"
    ],
    a:0
},
{
    q:"During a nature walk, a child sees a train passing by. What special letter pattern can be found in the word train?",
    o:[
        "Vowel combination",
        "Double consonant",
        "No vowels",
        "Silent word"
    ],
    a:0
},
{
    q:"Which group contains only words with vowel combinations?",
    o:[
        "rain, boat, team",
        "cat, dog, sun",
        "pen, bus, hat",
        "cup, bag, map"
    ],
    a:0
},
{
    q:"A child reads the word moon. What special pattern does the child notice?",
    o:[
        "Two vowels working together",
        "Double consonants",
        "No vowels",
        "Three consonants together"
    ],
    a:0
},
{
    q:"A child is sorting words into two groups: \"vowel combinations\" and \"other words.\" Where should leaf be placed?",
    o:[
        "Vowel combinations",
        "Other words",
        "Both groups",
        "Neither group"
    ],
    a:0
},
{
    q:"During a game, the teacher says, \"Stand up if your word has two vowels together.\" Which word should make a child stand?",
    o:[
        "moon",
        "bag",
        "cup",
        "hat"
    ],
    a:0
},
{
    q:"A child finds these words in a book: tree, cat, dog, bus. Which word has a vowel combination?",
    o:[
        "tree",
        "cat",
        "dog",
        "bus"
    ],
    a:0
},
{
    q:"Which food word contains a vowel combination?",
    o:[
        "bread",
        "bun",
        "jam",
        "pie"
    ],
    a:0
},
{
    q:"Which word does NOT contain a vowel combination?",
    o:[
        "rain",
        "boat",
        "team",
        "pen"
    ],
    a:3
},
{
    q:"A teacher asks children to find a word that has the same vowel pattern as rain. Which word should be chosen?",
    o:[
        "train",
        "cat",
        "dog",
        "bus"
    ],
    a:0
},
{
    q:"A child sees the word seed during reading time. What special pattern can be found in the word?",
    o:[
        "Vowel combination",
        "Double consonant",
        "No vowels",
        "Silent letter"
    ],
    a:0
},
{
    q:"Why do we learn vowel combinations?",
    o:[
        "To help us read and recognise word patterns more easily",
        "To count objects",
        "To tell time",
        "To measure length"
    ],
    a:0
}
];

let current = 0;
let score = 0;

// Fisher–Yates shuffle to randomise question order
function shuffleQuestions(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    shuffleQuestions(questions);
    loadQuestion();
},3000);

function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerHTML = "🎉 Game Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    let q = questions[current];
    document.getElementById("question").innerHTML = q.q.replace(/\n/g,"<br>");

    let optHTML = "";
    q.o.forEach((opt,i)=>{
        optHTML += `<div class='option' onclick='checkAnswer(this,${i})'>${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function checkAnswer(el,i){
    let q = questions[current];

    if(i === q.a){
        el.classList.add("correct");
        document.getElementById("correctSound").play();
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createConfetti();
        setTimeout(()=>{ current++; loadQuestion(); },1200);
    }else{
        el.classList.add("wrong");
        document.getElementById("wrongSound").play();
    }
}

function createConfetti(){
    for(let i=0;i<25;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","orange","#fff","#f6c28b"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
