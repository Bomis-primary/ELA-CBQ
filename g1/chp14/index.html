<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - Grade 1 - Chapter 14: Question Words</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fbe7c6,#f7f3e9,#f6c28b);
    overflow-x:hidden;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

#splash img{
    width:200px;
    animation:zoom 2s ease-in-out;
}

@keyframes zoom{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* Game Container */
#game{
    display:none;
    padding:20px;
    text-align:center;
}

/* Header (Grade + Chapter) */
#header{
    margin-bottom:10px;
    font-size:20px;
    font-weight:bold;
    color:#4b2e16;
}

/* Score */
#score{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Question Box */
.question-box{
    background:rgba(75,46,22,0.9);
    color:#fff;
    padding:18px;
    border-radius:18px;
    max-width:750px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    font-size:20px;
}

/* Options */
.option{
    display:block;
    margin:10px auto;
    padding:12px;
    width:85%;
    max-width:520px;
    background:#fffaf0;
    border:2px solid #8b5a2b;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
    background:#ffffff;
}

/* Correct / Wrong */
.correct{
    background:#b6f7b6 !important;
    border-color:green;
}

.wrong{
    background:#f7b6b6 !important;
    border-color:red;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- SPLASH with Innovine logo -->
<div id="splash">
    <img src="assets/logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="game">
    <div id="header">Grade 1 - Chapter 14: Question Words</div>
    <div id="score">Score: 0</div>

    <div class="question-box" id="question">Loading...</div>
    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// QUESTIONS (shuffled once at start)
let questions = [
{
    q:"A child enters the playground and wants to know the name of the child sitting on a bench. Which question should be asked?",
    o:[
        "Where is sitting on the bench?",
        "Who is sitting on the bench?",
        "When is sitting on the bench?",
        "Why is sitting on the bench?"
    ],
    a:1
},
{
    q:"A child cannot find a water bottle in the classroom. Which question is most suitable?",
    o:[
        "Where is my water bottle?",
        "Who is my water bottle?",
        "When is my water bottle?",
        "Why is my water bottle?"
    ],
    a:0
},
{
    q:"A child sees many crayons and wants to choose one colour. Which question should be asked?",
    o:[
        "Which crayon should I use?",
        "Who crayon should I use?",
        "When crayon should I use?",
        "Why crayon should I use?"
    ],
    a:0
},
{
    q:"A child wants to know the starting time of a football match. Which question is correct?",
    o:[
        "Who is the football match?",
        "What is the football match?",
        "When does the football match start?",
        "Where does the football match start?"
    ],
    a:2
},
{
    q:"A student sees a new object on the teacher's table and wants to know about it. Which question should be asked?",
    o:[
        "What is that?",
        "Who is that?",
        "Where is that?",
        "When is that?"
    ],
    a:0
},
{
    q:"A child notices that a friend looks upset and wants to know the reason. Which question is best?",
    o:[
        "Who are you upset?",
        "Why are you upset?",
        "Where are you upset?",
        "When are you upset?"
    ],
    a:1
},
{
    q:"Which question word would best help you choose between two storybooks?",
    o:[
        "who",
        "when",
        "which",
        "why"
    ],
    a:2
},
{
    q:"A student wants to know the person leading the morning assembly. Which question should be asked?",
    o:[
        "What is leading the assembly?",
        "Who is leading the assembly?",
        "Where is leading the assembly?",
        "Why is leading the assembly?"
    ],
    a:1
},
{
    q:"A family plans to visit a park. A child wants to know the location. Which question should be asked?",
    o:[
        "Why is the park?",
        "Who is the park?",
        "Where is the park?",
        "When is the park?"
    ],
    a:2
},
{
    q:"A child wants to know the day of a friend's birthday party. Which question is correct?",
    o:[
        "When is your birthday party?",
        "Who is your birthday party?",
        "Where is your birthday party?",
        "Why is your birthday party?"
    ],
    a:0
},
{
    q:"A child sees a classmate eating something different and wants to know about the food. Which question should be asked?",
    o:[
        "What are you eating?",
        "Who are you eating?",
        "Where are you eating?",
        "Why are you eating?"
    ],
    a:0
},
{
    q:"Which question word is used to ask for a reason?",
    o:[
        "what",
        "who",
        "why",
        "where"
    ],
    a:2
},
{
    q:"A teacher asks students to choose between the red team and the blue team. Which question would help a child decide?",
    o:[
        "Which team should I join?",
        "Who team should I join?",
        "When team should I join?",
        "Why team should I join?"
    ],
    a:0
},
{
    q:"A student wants to know the destination of a school trip. Which question is correct?",
    o:[
        "What are we going?",
        "Why are we going?",
        "Where are we going?",
        "Who are we going?"
    ],
    a:2
},
{
    q:"Why do we use question words such as what, who, when, where, why and which?",
    o:[
        "To ask for different kinds of information",
        "To show colours",
        "To describe actions",
        "To count objects"
    ],
    a:0
}
];

let current = 0;
let score = 0;

// Fisher–Yates shuffle to randomise question order
function shuffleQuestions(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    shuffleQuestions(questions);
    loadQuestion();
},3000);

function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerHTML = "🎉 Game Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    let q = questions[current];
    document.getElementById("question").innerHTML = q.q.replace(/\n/g,"<br>");

    let optHTML = "";
    q.o.forEach((opt,i)=>{
        optHTML += `<div class='option' onclick='checkAnswer(this,${i})'>${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function checkAnswer(el,i){
    let q = questions[current];

    if(i === q.a){
        el.classList.add("correct");
        document.getElementById("correctSound").play();
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createConfetti();
        setTimeout(()=>{ current++; loadQuestion(); },1200);
    }else{
        el.classList.add("wrong");
        document.getElementById("wrongSound").play();
    }
}

function createConfetti(){
    for(let i=0;i<25;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","orange","#fff","#f6c28b"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
