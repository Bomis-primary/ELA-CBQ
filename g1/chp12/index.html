<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - Grade 1 - Chapter 12: Position Words (in, on, under, near)</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fbe7c6,#f7f3e9,#f6c28b);
    overflow-x:hidden;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

#splash img{
    width:200px;
    animation:zoom 2s ease-in-out;
}

@keyframes zoom{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* Game Container */
#game{
    display:none;
    padding:20px;
    text-align:center;
}

/* Header (Grade + Chapter) */
#header{
    margin-bottom:10px;
    font-size:20px;
    font-weight:bold;
    color:#4b2e16;
}

/* Score */
#score{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Question Box */
.question-box{
    background:rgba(75,46,22,0.9);
    color:#fff;
    padding:18px;
    border-radius:18px;
    max-width:750px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    font-size:20px;
}

/* Options */
.option{
    display:block;
    margin:10px auto;
    padding:12px;
    width:85%;
    max-width:520px;
    background:#fffaf0;
    border:2px solid #8b5a2b;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
    background:#ffffff;
}

/* Correct / Wrong */
.correct{
    background:#b6f7b6 !important;
    border-color:green;
}

.wrong{
    background:#f7b6b6 !important;
    border-color:red;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- SPLASH with Innovine logo -->
<div id="splash">
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="game">
    <div id="header">Grade 1 - Chapter 12: Position Words (in, on, under, near)</div>
    <div id="score">Score: 0</div>

    <div class="question-box" id="question">Loading...</div>
    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// QUESTIONS (shuffled once at start)
let questions = [
{
    q:"A child keeps a notebook inside a school bag before leaving for school. Which sentence correctly describes the notebook?",
    o:[
        "The notebook is on the bag.",
        "The notebook is in the bag.",
        "The notebook is under the bag.",
        "The notebook is near the bag."
    ],
    a:1
},
{
    q:"A pencil is resting on top of a desk. Which sentence best describes its position?",
    o:[
        "The pencil is in the desk.",
        "The pencil is under the desk.",
        "The pencil is on the desk.",
        "The pencil is near the desk.",
    ],
    a:2
},
{
    q:"A ball is lying beside a tree in the playground. Which sentence is correct?",
    o:[
        "The ball is in the tree.",
        "The ball is on the tree.",
        "The ball is under the tree.",
        "The ball is near the tree."
    ],
    a:3
},
{
    q:"A child cannot find a kitten. Then the child sees it below a chair. Which position word best describes where the kitten is?",
    o:[
        "in",
        "on",
        "under",
        "near"
    ],
    a:2
},
{
    q:"A child places a lunch box inside a cupboard. Which sentence is correct?",
    o:[
        "The lunch box is on the cupboard.",
        "The lunch box is under the cupboard.",
        "The lunch box is near the cupboard.",
        "The lunch box is in the cupboard."
    ],
    a:3
},
{
    q:"Which sentence correctly describes something that is below a table?",
    o:[
        "The cat is under the table.",
        "The cat is on the table.",
        "The cat is in the table.",
        "The cat is near the table."
    ],
    a:0
},
{
    q:"A child leaves shoes beside the front door. Which sentence is correct?",
    o:[
        "The shoes are in the door.",
        "The shoes are on the door.",
        "The shoes are under the door.",
        "The shoes are near the door."
    ],
    a:3
},
{
    q:"A child keeps toys inside a toy box after playing. Which word best describes the toys?",
    o:[
        "in",
        "on",
        "under",
        "near"
    ],
    a:0
},
{
    q:"A child sees a book resting on a shelf. Which position word should be used?",
    o:[
        "in",
        "on",
        "under",
        "near"
    ],
    a:1
},
{
    q:"A puppy is sleeping below a bench in the garden. Which sentence is correct?",
    o:[
        "The puppy is near the bench.",
        "The puppy is in the bench.",
        "The puppy is under the bench.",
        "The puppy is on the bench."
    ],
    a:2
},
{
    q:"A water bottle is standing beside a school bag. Which word best describes the bottle's position?",
    o:[
        "in",
        "on",
        "under",
        "near"
    ],
    a:3
},
{
    q:"Which group contains only position words?",
    o:[
        "in, on, under, near",
        "run, jump, play, sing",
        "book, bag, pencil, ruler",
        "red, blue, tall, happy"
    ],
    a:0
},
{
    q:"A child looks for a toy car and finds it inside a drawer. Which sentence is correct?",
    o:[
        "The toy car is under the drawer.",
        "The toy car is near the drawer.",
        "The toy car is on the drawer.",
        "The toy car is in the drawer."
    ],
    a:3
},
{
    q:"A bird is sitting on a branch. Which position word best describes the bird?",
    o:[
        "on",
        "in",
        "under",
        "near"
    ],
    a:0
},
{
    q:"Why do we use position words such as in, on, under and near?",
    o:[
        "To tell where a person, animal or thing is located",
        "To describe colours",
        "To show actions",
        "To tell time"
    ],
    a:0
}
];

let current = 0;
let score = 0;

// Fisher–Yates shuffle to randomise question order
function shuffleQuestions(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    shuffleQuestions(questions);
    loadQuestion();
},3000);

function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerHTML = "🎉 Game Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    let q = questions[current];
    document.getElementById("question").innerHTML = q.q.replace(/\n/g,"<br>");

    let optHTML = "";
    q.o.forEach((opt,i)=>{
        optHTML += `<div class='option' onclick='checkAnswer(this,${i})'>${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function checkAnswer(el,i){
    let q = questions[current];

    if(i === q.a){
        el.classList.add("correct");
        document.getElementById("correctSound").play();
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createConfetti();
        setTimeout(()=>{ current++; loadQuestion(); },1200);
    }else{
        el.classList.add("wrong");
        document.getElementById("wrongSound").play();
    }
}

function createConfetti(){
    for(let i=0;i<25;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","orange","#fff","#f6c28b"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
