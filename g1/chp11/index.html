<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBQ Interactive - Grade 1 - Chapter 11: The Sentence and Punctuation</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fbe7c6,#f7f3e9,#f6c28b);
    overflow-x:hidden;
}

/* Splash Screen */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:10;
}

#splash img{
    width:200px;
    animation:zoom 2s ease-in-out;
}

@keyframes zoom{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* Game Container */
#game{
    display:none;
    padding:20px;
    text-align:center;
}

/* Header (Grade + Chapter) */
#header{
    margin-bottom:10px;
    font-size:20px;
    font-weight:bold;
    color:#4b2e16;
}

/* Score */
#score{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

/* Question Box */
.question-box{
    background:rgba(75,46,22,0.9);
    color:#fff;
    padding:18px;
    border-radius:18px;
    max-width:750px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    font-size:20px;
}

/* Options */
.option{
    display:block;
    margin:10px auto;
    padding:12px;
    width:85%;
    max-width:520px;
    background:#fffaf0;
    border:2px solid #8b5a2b;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    transform:scale(1.03);
    background:#ffffff;
}

/* Correct / Wrong */
.correct{
    background:#b6f7b6 !important;
    border-color:green;
}

.wrong{
    background:#f7b6b6 !important;
    border-color:red;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: gold;
    top: -10px;
    animation: fall 3s linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- SPLASH with Innovine logo -->
<div id="splash">
    <!-- corrected path + filename -->
    <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="game">
    <div id="header">Grade 1 - Chapter 11: The Sentence and Punctuation</div>
    <div id="score">Score: 0</div>

    <div class="question-box" id="question">Loading...</div>
    <div id="options"></div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
// QUESTIONS (shuffled once at start)
let questions = [
{
    q:"A child wants to tell the teacher about helping a friend. Which option shares a complete thought?",
    o:[
        "helping my friend",
        "my friend helping",
        "I helped my friend today.",
        "helped friend"
    ],
    a:2
},
{
    q:"A student wants to tell the class about a drawing. Which sentence is written correctly?",
    o:[
        "i drew a picture.",
        "I drew a picture.",
        "I drew a picture",
        "i drew a picture"
    ],
    a:1
},
{
    q:"A child cannot find a pencil and wants to ask a question. Which sentence should be used?",
    o:[
        "Where is my pencil?",
        "Where is my pencil.",
        "where is my pencil",
        "Where is my pencil"
    ],
    a:0
},
{
    q:"Which option tells a complete idea?",
    o:[
        "running in the park",
        "The children are running in the park.",
        "in the park",
        "children running"
    ],
    a:1
},
{
    q:"A child wants to invite a friend to a birthday party. Which sentence is written correctly?",
    o:[
        "will you come to my party?",
        "Will you come to my party?",
        "Will you come to my party.",
        "will you come to my party."
    ],
    a:1
},
{
    q:"Which group contains only complete sentences?",
    o:[
        "The dog is barking. The cat is sleeping.",
        "barking loudly, sleeping quietly",
        "dog barking, cat sleeping",
        "in the garden, under the tree"
    ],
    a:0
},
{
    q:"A child wants to thank a friend for sharing lunch. Which sentence is most appropriate?",
    o:[
        "Thank you for sharing your lunch.",
        "thank you for sharing your lunch",
        "Thank you for sharing your lunch",
        "Thank you for sharing your lunch?"
    ],
    a:0
},
{
    q:"A child wants to know what time school starts. Which punctuation mark should be used at the end?",
    o:[
        "?",
        ".",
        ",",
        "!"
    ],
    a:0
},
{
    q:"A child is writing a story about a pet rabbit. Which sentence is written correctly?",
    o:[
        "my rabbit likes carrots.",
        "My rabbit likes carrots.",
        "My rabbit likes carrots",
        "my rabbit likes carrots"
    ],
    a:1
},
{
    q:"A student wants to ask the teacher for permission to drink water. Which sentence is correct?",
    o:[
        "May I drink water?",
        "May I drink water.",
        "may I drink water?",
        "May I drink water"
    ],
    a:0
},
{
    q:"A child reads a sign that says, \"Keep the classroom clean.\" What does this show?",
    o:[
        "A complete sentence gives a clear message.",
        "Only long sentences are useful.",
        "Words do not need order.",
        "Sentences do not need meaning."
    ],
    a:0
},
{
    q:"Which sentence begins correctly?",
    o:[
        "my friend is kind.",
        "My friend is kind.",
        "my Friend is kind.",
        "my friend Is kind."
    ],
    a:1
},
{
    q:"A child cannot find a water bottle. Which sentence should be used?",
    o:[
        "Where is my water bottle?",
        "Where is my water bottle.",
        "where is my water bottle?",
        "Where is my water bottle"
    ],
    a:0
},
{
    q:"A child wants to tell a parent about a school trip. Which sentence is correct?",
    o:[
        "We visited a museum today.",
        "we visited a museum today.",
        "We visited a museum today",
        "we visited a museum today"
    ],
    a:0
},
{
    q:"Why do we use capital letters, full stops and question marks?",
    o:[
        "To help people read and understand sentences correctly",
        "To make words longer",
        "To count objects",
        "To change meanings randomly"
    ],
    a:0
}
];

let current = 0;
let score = 0;

// Fisher–Yates shuffle to randomise question order
function shuffleQuestions(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("game").style.display="block";
    shuffleQuestions(questions);
    loadQuestion();
},3000);

function loadQuestion(){
    if(current >= questions.length){
        document.getElementById("question").innerHTML = "🎉 Game Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("clapSound").play();
        return;
    }

    let q = questions[current];
    document.getElementById("question").innerHTML = q.q.replace(/\n/g,"<br>");

    let optHTML = "";
    q.o.forEach((opt,i)=>{
        optHTML += `<div class="option" onclick="checkAnswer(this,${i})">${opt}</div>`;
    });

    document.getElementById("options").innerHTML = optHTML;
}

function checkAnswer(el,i){
    let q = questions[current];

    if(i === q.a){
        el.classList.add("correct");
        document.getElementById("correctSound").play();
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createConfetti();
        setTimeout(()=>{ current++; loadQuestion(); },1200);
    }else{
        el.classList.add("wrong");
        document.getElementById("wrongSound").play();
    }
}

function createConfetti(){
    for(let i=0;i<25;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["gold","orange","#fff","#f6c28b"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
