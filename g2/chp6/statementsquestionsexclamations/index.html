<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Statements, Questions, Exclamations Challenge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow-x: hidden;
    background: linear-gradient(135deg,#bfe3ff,#e8f7ff,#d6ecff,#aee0ff);
    background-size: 400% 400%;
    animation: bgShift 18s ease infinite;
  }
  @keyframes bgShift {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  /* drifting clouds */
  .cloud {
    position: fixed;
    border-radius: 50px;
    background: #fff;
    opacity: 0.7;
    z-index: 0;
    pointer-events: none;
    animation: drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }
  @keyframes drift {
    0% { transform: translateX(-120vw); }
    100% { transform: translateX(120vw); }
  }

  /* sparkles for sunny/excited feel */
  .spark {
    position: fixed;
    top: -20px;
    font-size: 16px;
    opacity: 0.55;
    z-index: 0;
    pointer-events: none;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(115vh) rotate(180deg); }
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #logoScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,#e8f7ff,#bfe3ff);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.6s ease;
  }
  #logoScreen img {
    width: 160px;
    max-width: 60vw;
    animation: pop 1s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  #logoScreen.hide { opacity: 0; pointer-events: none; }

  .card {
    background: rgba(255,255,255,0.92);
    border-radius: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    padding: 28px 22px;
    width: 100%;
    text-align: center;
    border: 3px solid #5fb8ff;
  }

  h1 {
    font-size: 1.5rem;
    color: #1f7fc4;
    margin-bottom: 6px;
  }
  .meta {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 18px;
  }
  .btn {
    background: linear-gradient(135deg,#5fb8ff,#ffd166);
    border: none;
    color: #fff;
    font-weight: bold;
    padding: 14px 30px;
    border-radius: 30px;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(95,184,255,0.4);
    transition: transform 0.15s ease;
  }
  .btn:active { transform: scale(0.95); }

  .hidden { display: none !important; }

  .topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-weight: bold;
    font-size: 0.95rem;
    color: #1f7fc4;
  }
  .score-pill, .timer-pill {
    background: #eaf8ff;
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    border: 2px solid #5fb8ff;
  }
  .timer-pill.warn { color: #ff4444; border-color: #ff4444; }

  .final-banner {
    background: linear-gradient(135deg,#5fb8ff,#ffd166);
    color: #fff;
    font-weight: bold;
    padding: 8px;
    border-radius: 14px;
    margin-bottom: 12px;
    font-size: 0.9rem;
  }

  .qtext {
    font-size: 1.08rem;
    color: #333;
    margin-bottom: 18px;
    line-height: 1.4;
    text-align: left;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .option {
    background: #f4fbff;
    border: 2px solid #cdeaff;
    border-radius: 14px;
    padding: 12px 14px;
    text-align: left;
    font-size: 0.98rem;
    cursor: pointer;
    transition: all 0.15s ease;
    color: #444;
  }
  .option:hover { border-color: #5fb8ff; }
  .option.correct {
    background: #d9ffe0;
    border-color: #4CAF50;
    color: #1b6b2c;
    font-weight: bold;
  }
  .option.wrong {
    background: #ffe1e1;
    border-color: #ff5c5c;
    color: #a80000;
  }
  .option.disabled { pointer-events: none; opacity: 0.75; }

  .feedback {
    margin-top: 14px;
    font-size: 0.92rem;
    color: #444;
    background: #fff7d6;
    border-radius: 12px;
    padding: 10px 12px;
    text-align: left;
    display: none;
    border-left: 4px solid #5fb8ff;
  }
  .feedback.show { display: block; }

  .nextBtn { margin-top: 16px; display:none; }

  #crossOverlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    pointer-events: none;
  }
  #crossOverlay svg {
    width: 90px;
    height: 90px;
    opacity: 0;
  }
  #crossOverlay.show svg {
    animation: crossPop 0.6s ease forwards;
  }
  @keyframes crossPop {
    0% { opacity: 0; transform: scale(0.4); }
    50% { opacity: 1; transform: scale(1.15); }
    100% { opacity: 0; transform: scale(1); }
  }

  .star {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 14px;
    background: #ffd166;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    z-index: 500;
    pointer-events: none;
  }

  .result-emoji { font-size: 3rem; margin-bottom: 6px; }
  .result-score { font-size: 1.4rem; color: #1f7fc4; font-weight: bold; margin: 10px 0; }
  .result-msg { color: #555; margin-bottom: 18px; }
</style>
</head>
<body>

<div id="logoScreen">
  <img src="assets/logo.png" alt="Innovine">
</div>

<div id="bgLayer"></div>

<div id="crossOverlay">
  <svg viewBox="0 0 100 100">
    <line x1="15" y1="15" x2="85" y2="85" stroke="#ff3b3b" stroke-width="12" stroke-linecap="round"/>
    <line x1="85" y1="15" x2="15" y2="85" stroke="#ff3b3b" stroke-width="12" stroke-linecap="round"/>
  </svg>
</div>

<div class="container">

  <div class="card" id="startScreen">
    <h1>🌤️ Statements, Questions, Exclamations</h1>
    <div class="meta">Grade 2 &nbsp;|&nbsp; English &nbsp;|&nbsp; Topic: Kinds of Sentences</div>
    <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">
      15 questions &nbsp;•&nbsp; 60 seconds each &nbsp;•&nbsp; One retry if you get it wrong!
    </p>
    <button class="btn" onclick="startGame()">Start Forecast ☀️</button>
  </div>

  <div class="card hidden" id="gameScreen">
    <div class="topbar">
      <div class="score-pill" id="scorePill">Score: 0 / 15</div>
      <div class="timer-pill" id="timerPill">⏱ 60s</div>
    </div>
    <div id="finalBanner" class="final-banner hidden">⛈️ Final Challenge!</div>
    <div class="qtext" id="qText"></div>
    <div class="options" id="optionsBox"></div>
    <div class="feedback" id="feedbackBox"></div>
    <button class="btn nextBtn" id="nextBtn" onclick="nextQuestion()">Next ➜</button>
  </div>

  <div class="card hidden" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🌈</div>
    <h1>Forecast Complete!</h1>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn" onclick="restartGame()">Play Again 🔄</button>
  </div>

</div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<script>
const bgLayer = document.getElementById('bgLayer');
const skyColors = ['#5fb8ff','#ffd166','#ffffff','#aee0ff'];
for (let i=0;i<6;i++){
  const c = document.createElement('div');
  c.className='cloud';
  const w = 70 + Math.random()*50;
  c.style.width = w+'px';
  c.style.height = (w*0.5)+'px';
  c.style.top = (10+Math.random()*50)+'vh';
  c.style.animationDuration = (30+Math.random()*20)+'s';
  c.style.animationDelay = (Math.random()*20)+'s';
  bgLayer.appendChild(c);
}
for (let i=0;i<8;i++){
  const s = document.createElement('div');
  s.className='spark';
  s.textContent = i % 2 === 0 ? '✨' : '☁️';
  s.style.left = Math.random()*100+'vw';
  s.style.animationDuration = (9+Math.random()*8)+'s';
  s.style.animationDelay = (Math.random()*8)+'s';
  bgLayer.appendChild(s);
}

window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('logoScreen').classList.add('hide');
  }, 5000);
});

const questions = [
{ q:"During recess, you cannot find your water bottle and want to know if your friend has seen it. Which sentence would best help you?",
  options:["My water bottle is blue.","Have you seen my water bottle?","What a beautiful water bottle!","My bottle is on the table."],
  answer:1, explain:"This sentence asks for information, so it is a question." },
{ q:"Which sentence has a different purpose from the others?",
  options:["The peacock opened its feathers.","We visited a science museum yesterday.","The bus reached school on time.","How colourful the peacock looks!"],
  answer:3, explain:"The other three are statements. This one expresses strong feeling, making it an exclamation." },
{ q:"A child sees fireworks for the first time and says: \"The fireworks are amazing!\" Why is an exclamation suitable here?",
  options:["Because the child is expressing strong excitement","Because the child is asking for information","Because the child is giving directions","Because the child is naming an object"],
  answer:0, explain:"Exclamations are used to express strong feelings like excitement or surprise." },
{ q:"You missed part of a cricket match and want to know the score. Which sentence would you use?",
  options:["India is batting well today.","What an exciting match!","What is the score now?","The players are wearing blue jerseys."],
  answer:2, explain:"This sentence asks for information about the score, making it a question." },
{ q:"Statement: \"Where did you keep the library book?\" is a question. Reason: It is asking for information.",
  options:["The reason is correct and explains the statement","The reason is correct but does not explain the statement","The reason is wrong but the statement is correct","Both the reason and the statement are wrong"],
  answer:0, explain:"The sentence asks for information, so the reason correctly explains the statement." },
{ q:"Which sentence shows incorrect understanding of sentence types?",
  options:["\"The giraffe is very tall.\" is a statement.","\"Can you see the zebra?\" is a question.","\"What a huge elephant!\" is an exclamation.","\"The lion is sleeping.\" is a question."],
  answer:3, explain:"\"The lion is sleeping.\" gives information, so it is a statement, not a question." },
{ q:"Which sentence would you use if you are surprised by how fast a train is moving?",
  options:["The train is moving quickly.","When will the train arrive?","What a fast train this is!","The train stopped at the station."],
  answer:2, explain:"This expresses surprise with strong feeling, making it an exclamation." },
{ q:"A notice board contains these sentences. Which one is punctuated incorrectly?",
  options:["Please line up near the gate.","Where is the lost-and-found counter.","What a wonderful performance!","The event starts at 9 a.m."],
  answer:1, explain:"This is a question, so it should end with a question mark, not a full stop." },
{ q:"Your class planted seeds last month. Today you notice tiny shoots growing. Which sentence best expresses your excitement?",
  options:["The seeds have grown.","Have the seeds grown?","What healthy plants these are!","The plants need water."],
  answer:2, explain:"This expresses excitement about the plants, making it an exclamation." },
{ q:"A student writes: \"Where is our classroom.\" What should be corrected?",
  options:["classroom → classrooms","is → are","Replace the full stop with a question mark","Where → There"],
  answer:2, explain:"Since this is a question, it should end with a question mark, not a full stop." },
{ q:"You notice that guests have arrived, but you do not know where they should sit. Which sentence would you ask?",
  options:["The guests have arrived.","What polite guests they are!","Where should the guests sit?","The chairs are near the window."],
  answer:2, explain:"This sentence asks for information about seating, making it a question." },
{ q:"Which sentence does not belong with the others?",
  options:["What a delicious mango!","What a beautiful rangoli!","What an exciting parade!","When does the parade begin?"],
  answer:3, explain:"The first three are exclamations expressing feeling. This one asks for information, making it a question." },
{ q:"Why is the sentence \"What a clever idea!\" an exclamation?",
  options:["Because it expresses a strong feeling","Because it asks for an answer","Because it gives information only","Because it tells someone what to do"],
  answer:0, explain:"The sentence expresses strong feeling/admiration, which makes it an exclamation." },
{ q:"Statement: \"Did you enjoy the puppet show?\" is a question. Reason: It is asking someone for an answer.",
  options:["Both are correct and the reason explains the statement","Both are correct but not related","Statement is correct, reason is wrong","Statement is wrong, reason is correct"],
  answer:0, explain:"The sentence asks for an answer, so the reason correctly explains the statement." },
{ q:"You are visiting the beach and suddenly see a dolphin jump out of the water. Which sentence would you most likely say?",
  options:["The dolphin jumped out of the water.","Where did the dolphin go?","What an amazing sight!","The water looks blue today."],
  answer:2, explain:"This expresses sudden excitement/surprise, making it an exclamation." }
];

let current = 0;
let score = 0;
let attempts = 0;
let timer = null;
let timeLeft = 60;
const TIME_PER_Q = 60;

const startScreen = document.getElementById('startScreen');
const gameScreen = document.getElementById('gameScreen');
const resultScreen = document.getElementById('resultScreen');
const qText = document.getElementById('qText');
const optionsBox = document.getElementById('optionsBox');
const scorePill = document.getElementById('scorePill');
const timerPill = document.getElementById('timerPill');
const feedbackBox = document.getElementById('feedbackBox');
const nextBtn = document.getElementById('nextBtn');
const finalBanner = document.getElementById('finalBanner');

function startGame(){
  startScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  current = 0; score = 0;
  loadQuestion();
}

function loadQuestion(){
  attempts = 0;
  feedbackBox.classList.remove('show');
  feedbackBox.innerHTML = '';
  nextBtn.style.display = 'none';
  scorePill.textContent = `Score: ${score} / ${questions.length}`;
  finalBanner.classList.toggle('hidden', current !== questions.length - 1);

  const q = questions[current];
  qText.textContent = `Q${current+1}. ${q.q}`;
  optionsBox.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = opt;
    div.onclick = () => selectOption(idx, div);
    optionsBox.appendChild(div);
  });

  startTimer();
}

function startTimer(){
  clearInterval(timer);
  timeLeft = TIME_PER_Q;
  timerPill.textContent = `⏱ ${timeLeft}s`;
  timerPill.classList.remove('warn');
  timer = setInterval(() => {
    timeLeft--;
    timerPill.textContent = `⏱ ${timeLeft}s`;
    if (timeLeft <= 10) timerPill.classList.add('warn');
    if (timeLeft <= 0){
      clearInterval(timer);
      handleTimeout();
    }
  }, 1000);
}

function handleTimeout(){
  processAnswer(-1, null);
}

function selectOption(idx, el){
  clearInterval(timer);
  const opts = optionsBox.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  processAnswer(idx, el);
}

function processAnswer(idx, el){
  const q = questions[current];
  const isCorrect = idx === q.answer;

  if (isCorrect){
    if (el) el.classList.add('correct');
    score++;
    scorePill.textContent = `Score: ${score} / ${questions.length}`;
    playSound('correctSound');
    burstStars();
    setTimeout(nextQuestion, 1200);
    return;
  }

  attempts++;
  if (el) el.classList.add('wrong');
  playSound('wrongSound');
  showCross();

  if (attempts === 1){
    feedbackBox.innerHTML = "Not quite — check the sky again! ☁️";
    feedbackBox.classList.add('show');
    const opts = optionsBox.querySelectorAll('.option');
    opts.forEach((o,i) => {
      if (i !== idx) o.classList.remove('disabled');
    });
    startTimer();
  } else {
    const opts = optionsBox.querySelectorAll('.option');
    opts.forEach((o,i) => {
      o.classList.add('disabled');
      if (i === q.answer) o.classList.add('correct');
    });
    feedbackBox.innerHTML = `<strong>Correct answer:</strong> ${q.options[q.answer]}<br><br>${q.explain}`;
    feedbackBox.classList.add('show');
    nextBtn.style.display = 'inline-block';
  }
}

function nextQuestion(){
  current++;
  if (current >= questions.length){
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult(){
  gameScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');
  document.getElementById('resultScore').textContent = `${score} / ${questions.length}`;
  let msg = '';
  let emoji = '🌈';
  const pct = score / questions.length;
  if (pct >= 0.8){ msg = "Clear skies ahead! You really understand sentence types!"; emoji='☀️'; }
  else if (pct >= 0.5){ msg = "Partly sunny! A little more practice and you'll shine."; emoji='⛅'; }
  else { msg = "A few clouds today — keep practicing and the sun will come out!"; emoji='🌦️'; }
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultEmoji').textContent = emoji;
  playSound('clapSound');
}

function restartGame(){
  resultScreen.classList.add('hidden');
  startScreen.classList.remove('hidden');
}

function playSound(id){
  const el = document.getElementById(id);
  if (!el) return;
  el.currentTime = 0;
  el.play().catch(()=>{});
}

function burstStars(){
  for (let i=0;i<14;i++){
    const star = document.createElement('div');
    star.className = 'star';
    const angle = Math.random()*2*Math.PI;
    const dist = 80 + Math.random()*120;
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist;
    star.style.background = skyColors[i % skyColors.length];
    document.body.appendChild(star);
    star.animate([
      { transform: 'translate(-50%,-50%) scale(0.5)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.1) rotate(180deg)`, opacity: 0 }
    ], { duration: 900, easing: 'ease-out' });
    setTimeout(() => star.remove(), 900);
  }
}

function showCross(){
  const overlay = document.getElementById('crossOverlay');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 650);
}
</script>
</body>
</html>
