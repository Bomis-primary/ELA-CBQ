<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 2 Compound Words Interactive</title>
    <style>
        :root {
            --primary: #4A90E2;
            --primary-dark: #357ABD;
            --success: #2ECC71;
            --error: #E74C3C;
            --background: #F5F7FA;
            --surface: #FFFFFF;
            --text: #2C3E50;
            --text-light: #7F8C8D;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        /* Top Bar Indicators */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .hud-item {
            background: #EDF2F7;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-badge {
            background: #FFEBEB;
            color: var(--error);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: #E2E8F0;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        /* Screens */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Intro Screen */
        #intro-screen {
            text-align: center;
            padding: 50px 10px;
        }

        .logo-placeholder {
            width: 180px;
            height: auto;
            max-height: 80px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        /* Question Layout */
        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            font-weight: 600;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: var(--surface);
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            font-weight: 500;
            display: block;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        @media (min-width: 768px) {
            .option-btn:hover:not(:disabled) {
                border-color: var(--primary);
                background: #F0F7FF;
            }
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #E6FFFA;
            border-color: var(--success);
            color: #234E52;
        }

        .option-btn.wrong {
            background: #FFF5F5;
            border-color: var(--error);
            color: #742A2A;
        }

        /* Controls / Feedback Panel */
        .feedback-panel {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-weight: 500;
            line-height: 1.4;
        }

        .feedback-panel.hint {
            background: #FEFCBF;
            border-left: 5px solid #D69E2E;
            color: #744210;
            display: block;
        }

        .feedback-panel.explanation {
            background: #EBF8FF;
            border-left: 5px solid var(--primary);
            color: #2B6CB0;
            display: block;
        }

        .action-container {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        .next-btn:hover {
            background: var(--primary-dark);
        }

        /* Results Screen */
        #result-screen {
            text-align: center;
            padding: 30px 10px;
        }

        .result-title {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .score-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
        }

        .restart-btn {
            background: var(--text);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Utilities */
        .audio-ctrl {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        /* Confetti Effect Overlays */
        .confetti-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <canvas id="canvas" class="confetti-canvas"></canvas>

    <div class="top-bar" id="hud" style="display: none;">
        <div class="hud-item" id="score-tracker">Score: 0</div>
        <button class="audio-ctrl" id="mute-btn" onclick="toggleMute()" title="Mute/Unmute">🔊</button>
        <div class="hud-item timer-badge" id="timer">⏱️ 60s</div>
    </div>

    <div class="progress-container" id="progress-container" style="display: none;">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="intro-screen" class="screen active">
        <img src="assets/logo.png" alt="Innovine Logo" class="logo-placeholder" onerror="this.style.display='none'">
        <h2 style="font-size: 1.6rem;">English Grammar Interactive: Compound Words</h2>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="question" class="question-text"></div>
        <div id="options" class="options-grid"></div>
        
        <div id="feedback" class="feedback-panel"></div>
        
        <div class="action-container">
            <button id="next-btn" class="next-btn" onclick="handleNext()">Next Question</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="result-title" id="result-title"></div>
        <p id="result-eval" style="font-size: 1.1rem; color: var(--text-light);"></p>
        <div class="score-display" id="final-score">0/15</div>
        <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
    </div>
</div>

<audio id="snd-correct" src="assets/claps.mp3" preload="auto"></audio>
<audio id="snd-wrong" src="assets/wrong.mp3" preload="auto"></audio>

<script>

            answer: 0,
            hint: "Think about which clothing item is specifically designed to shield you completely from the rain.",
