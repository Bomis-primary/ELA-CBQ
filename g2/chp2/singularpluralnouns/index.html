<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Singular & Plural Nouns Challenge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow-x: hidden;
    background: linear-gradient(135deg,#ffd1ff,#c1f0ff,#fff4c1,#c1ffd6);
    background-size: 400% 400%;
    animation: bgShift 18s ease infinite;
  }
  @keyframes bgShift {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  /* Floating balloons background */
  .balloon {
    position: fixed;
    bottom: -120px;
    width: 40px;
    height: 52px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.55;
    animation: floatUp linear infinite;
    z-index: 0;
    pointer-events: none;
  }
  .balloon::after{
    content:'';
    position:absolute;
    bottom:-18px;
    left:50%;
    width:1px;
    height:18px;
    background:rgba(120,120,120,0.4);
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) rotate(0deg); }
    50% { transform: translateY(-55vh) translateX(20px) rotate(8deg); }
    100% { transform: translateY(-115vh) translateX(-10px) rotate(-6deg); }
  }

  .streamer {
    position: fixed;
    top: -60px;
    width: 6px;
    height: 60px;
    opacity: 0.5;
    animation: fall linear infinite;
    z-index: 0;
    pointer-events: none;
    border-radius: 3px;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(115vh) rotate(360deg); }
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Logo intro screen */
  #logoScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,#fff9e6,#e6fbff);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.6s ease;
  }
  #logoScreen img {
    width: 160px;
    max-width: 60vw;
    animation: pop 1s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  #logoScreen.hide { opacity: 0; pointer-events: none; }

  .card {
    background: rgba(255,255,255,0.9);
    border-radius: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    padding: 28px 22px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(2px);
  }

  h1 {
    font-size: 1.5rem;
    color: #ff4fa3;
    margin-bottom: 6px;
  }
  .meta {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 18px;
  }
  .btn {
    background: linear-gradient(135deg,#ff8fd6,#ffd166);
    border: none;
    color: #fff;
    font-weight: bold;
    padding: 14px 30px;
    border-radius: 30px;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(255,105,180,0.35);
    transition: transform 0.15s ease;
  }
  .btn:active { transform: scale(0.95); }

  .hidden { display: none !important; }

  /* Header bar during game */
  .topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-weight: bold;
    font-size: 0.95rem;
    color: #444;
  }
  .score-pill, .timer-pill {
    background: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  }
  .timer-pill.warn { color: #ff4444; }

  .final-banner {
    background: linear-gradient(135deg,#ffd166,#ff8fd6);
    color: #fff;
    font-weight: bold;
    padding: 8px;
    border-radius: 14px;
    margin-bottom: 12px;
    font-size: 0.9rem;
  }

  .qtext {
    font-size: 1.08rem;
    color: #333;
    margin-bottom: 18px;
    line-height: 1.4;
    text-align: left;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .option {
    background: #fef6ff;
    border: 2px solid #ffd6f0;
    border-radius: 14px;
    padding: 12px 14px;
    text-align: left;
    font-size: 0.98rem;
    cursor: pointer;
    transition: all 0.15s ease;
    color: #444;
  }
  .option:hover { border-color: #ff8fd6; }
  .option.correct {
    background: #d9ffe0;
    border-color: #4CAF50;
    color: #1b6b2c;
    font-weight: bold;
  }
  .option.wrong {
    background: #ffe1e1;
    border-color: #ff5c5c;
    color: #a80000;
  }
  .option.disabled { pointer-events: none; opacity: 0.75; }

  .feedback {
    margin-top: 14px;
    font-size: 0.92rem;
    color: #444;
    background: #fff7e0;
    border-radius: 12px;
    padding: 10px 12px;
    text-align: left;
    display: none;
  }
  .feedback.show { display: block; }

  .nextBtn { margin-top: 16px; display:none; }

  /* red cross overlay */
  #crossOverlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    pointer-events: none;
  }
  #crossOverlay svg {
    width: 90px;
    height: 90px;
    opacity: 0;
  }
  #crossOverlay.show svg {
    animation: crossPop 0.6s ease forwards;
  }
  @keyframes crossPop {
    0% { opacity: 0; transform: scale(0.4); }
    50% { opacity: 1; transform: scale(1.15); }
    100% { opacity: 0; transform: scale(1); }
  }

  /* star confetti */
  .star {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 14px;
    background: #ffd166;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    z-index: 500;
    pointer-events: none;
  }

  .result-emoji { font-size: 3rem; margin-bottom: 6px; }
  .result-score { font-size: 1.4rem; color: #ff4fa3; font-weight: bold; margin: 10px 0; }
  .result-msg { color: #555; margin-bottom: 18px; }
</style>
</head>
<body>

<!-- Logo intro -->
<div id="logoScreen">
  <img src="assets/logo.png" alt="Innovine">
</div>

<!-- background balloons/streamers -->
<div id="bgLayer"></div>

<div id="crossOverlay">
  <svg viewBox="0 0 100 100">
    <line x1="15" y1="15" x2="85" y2="85" stroke="#ff3b3b" stroke-width="12" stroke-linecap="round"/>
    <line x1="85" y1="15" x2="15" y2="85" stroke="#ff3b3b" stroke-width="12" stroke-linecap="round"/>
  </svg>
</div>

<div class="container">

  <!-- Intro / Start screen -->
  <div class="card" id="startScreen">
    <h1>🎈 Singular & Plural Nouns Challenge</h1>
    <div class="meta">Grade 2 &nbsp;|&nbsp; English &nbsp;|&nbsp; Topic: Singular & Plural Nouns</div>
    <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">
      15 questions &nbsp;•&nbsp; 60 seconds each &nbsp;•&nbsp; One retry if you get it wrong!
    </p>
    <button class="btn" onclick="startGame()">Start Challenge 🚀</button>
  </div>

  <!-- Question screen -->
  <div class="card hidden" id="gameScreen">
    <div class="topbar">
      <div class="score-pill" id="scorePill">Score: 0 / 15</div>
      <div class="timer-pill" id="timerPill">⏱ 60s</div>
    </div>
    <div id="finalBanner" class="final-banner hidden">🏆 Final Challenge!</div>
    <div class="qtext" id="qText"></div>
    <div class="options" id="optionsBox"></div>
    <div class="feedback" id="feedbackBox"></div>
    <button class="btn nextBtn" id="nextBtn" onclick="nextQuestion()">Next ➜</button>
  </div>

  <!-- Result screen -->
  <div class="card hidden" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <h1>Challenge Complete!</h1>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn" onclick="restartGame()">Play Again 🔄</button>
  </div>

</div>

<!-- Audio -->
<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<script>
/* ---------------- Background balloons & streamers ---------------- */
const bgLayer = document.getElementById('bgLayer');
const balloonColors = ['#ff8fd6','#ffd166','#8fd6ff','#a0ffb3','#ffb3b3'];
for (let i=0;i<9;i++){
  const b = document.createElement('div');
  b.className='balloon';
  b.style.left = Math.random()*100+'vw';
  b.style.background = balloonColors[i % balloonColors.length];
  b.style.animationDuration = (14+Math.random()*10)+'s';
  b.style.animationDelay = (Math.random()*10)+'s';
  bgLayer.appendChild(b);
}
for (let i=0;i<6;i++){
  const s = document.createElement('div');
  s.className='streamer';
  s.style.left = Math.random()*100+'vw';
  s.style.background = balloonColors[i % balloonColors.length];
  s.style.animationDuration = (9+Math.random()*8)+'s';
  s.style.animationDelay = (Math.random()*8)+'s';
  bgLayer.appendChild(s);
}

/* ---------------- Logo intro (5 seconds) ---------------- */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('logoScreen').classList.add('hide');
  }, 5000);
});

/* ---------------- Question data ---------------- */
const questions = [
{ q:"During a community gardening activity, volunteers planted several flowering plants. Which sentence is written correctly?",
  options:["Many bush were planted near the fence.","Many bushes were planted near the fence.","Many bushs were planted near the fence.","Many bushes was planted near the fence."],
  answer:1, explain:"'Bush' ends in 'sh', so we add -es: bushes." },
{ q:"Words: boxes, benches, watches, books. Which word follows a different plural rule?",
  options:["boxes","benches","watches","books"],
  answer:3, explain:"Boxes, benches, and watches end in x/ch/tch and take -es. 'Books' just adds a regular -s." },
{ q:"A child says: \"I wrote 'glasss' because there are many glass.\" Why is this not correct?",
  options:["Because words ending in ss usually take -es in the plural form","Because glass cannot become plural","Because all plurals take only -s","Because glass is an uncountable noun"],
  answer:0, explain:"Words ending in 'ss' add -es, so the correct plural is 'glasses'." },
{ q:"Your family is waiting at a railway station. You notice several clocks showing different timings. Which sentence would you say?",
  options:["The clocks on the platform are showing different times.","The clock on the platform are showing different times.","The clockes on the platform are showing different times.","The clocks on the platform is showing different times."],
  answer:0, explain:"'Clock' takes a regular -s plural: clocks, and matches with 'are'." },
{ q:"Statement: We write \"dishes\" when talking about more than one dish. Reason: Words ending in sh usually take -es in their plural form.",
  options:["The reason is correct and explains the statement","The reason is correct but does not explain the statement","The reason is wrong but the statement is correct","Both the reason and the statement are wrong"],
  answer:0, explain:"'Dish' ends in 'sh', so it takes -es — the reason directly explains the statement." },
{ q:"A child is helping decorate for a school celebration. Which sentence shows incorrect understanding of plural nouns?",
  options:["We hung colourful flags around the stage.","We arranged many chairs for the guests.","We placed several box near the entrance.","We displayed student projects on tables."],
  answer:2, explain:"'Several box' should be 'several boxes' — box ends in x, so it takes -es." },
{ q:"Which sentence shows correct understanding of plural forms?",
  options:["I would write \"foxes\" because words ending in x often take -es.","I would write \"foxs\" because all plurals take -s.","I would write \"foxess\" because the word ends in x.","I would keep \"fox\" unchanged even when there are many."],
  answer:0, explain:"Words ending in 'x' take -es, so fox becomes foxes." },
{ q:"Which sentence is incorrect?",
  options:["Several buses arrived at the depot.","The classes ended early today.","We bought fresh mangoes from the market.","The teacher collected many worksheet."],
  answer:3, explain:"'Worksheet' needs a plural -s: worksheets, since many were collected." },
{ q:"At a nature camp, students observed different insects. Which sentence is written correctly?",
  options:["We saw many butterfly near the pond.","We saw many butterflies near the pond.","We saw many butterflys near the pond.","We saw many butterflies near ponds."],
  answer:1, explain:"'Butterfly' ends in a consonant + y, so y changes to ies: butterflies." },
{ q:"A notice reads: \"Please return all library book to the shelf after reading.\" What should be corrected?",
  options:["library → libraries","shelf → shelfs","book → books","reading → read"],
  answer:2, explain:"Since it refers to more than one book, 'book' should become 'books'." },
{ q:"During a cooking activity, children helped arrange utensils. Which sentence is correct?",
  options:["The spoons and plates are ready.","The spoons and plate are ready.","The spoones and plates are ready.","The spoon and plates is ready."],
  answer:0, explain:"Both 'spoon' and 'plate' take regular -s plurals: spoons, plates." },
{ q:"Words: glasses, dresses, buses, pencils. Which word does not follow the same plural rule as the others?",
  options:["glasses","dresses","buses","pencils"],
  answer:3, explain:"Glasses, dresses, and buses all add -es (ss/s endings). 'Pencils' just adds a regular -s." },
{ q:"Why do we write \"matches\" instead of \"matchs\"?",
  options:["Because words ending in ch usually take -es in the plural form","Because longer words always take -es","Because all sports words take -es","Because match is a proper noun"],
  answer:0, explain:"Words ending in 'ch' take -es, so match becomes matches." },
{ q:"Statement: The word \"wishes\" is the correct plural form of wish. Reason: Words ending in sh generally add -es to show more than one.",
  options:["Both are correct and the reason explains the statement","Both are correct but not related","Statement is correct, reason is wrong","Statement is wrong, reason is correct"],
  answer:0, explain:"'Wish' ends in 'sh', so -es is added, making the reason directly explain the statement." },
{ q:"At a science exhibition, visitors stopped to look at different models. Which sentence would you most likely hear?",
  options:["The models are displayed in the hall.","The models is displayed in the hall.","The model are displayed in the hall.","The modeles are displayed in the hall."],
  answer:0, explain:"'Model' takes a regular -s plural: models, matching with 'are'." }
];

/* ---------------- Game state ---------------- */
let current = 0;
let score = 0;
let attempts = 0;
let timer = null;
let timeLeft = 60;
const TIME_PER_Q = 60; // Grade 2 -> 60 seconds

const startScreen = document.getElementById('startScreen');
const gameScreen = document.getElementById('gameScreen');
const resultScreen = document.getElementById('resultScreen');
const qText = document.getElementById('qText');
const optionsBox = document.getElementById('optionsBox');
const scorePill = document.getElementById('scorePill');
const timerPill = document.getElementById('timerPill');
const feedbackBox = document.getElementById('feedbackBox');
const nextBtn = document.getElementById('nextBtn');
const finalBanner = document.getElementById('finalBanner');

function startGame(){
  startScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  current = 0; score = 0;
  loadQuestion();
}

function loadQuestion(){
  attempts = 0;
  feedbackBox.classList.remove('show');
  feedbackBox.innerHTML = '';
  nextBtn.style.display = 'none';
  scorePill.textContent = `Score: ${score} / ${questions.length}`;
  finalBanner.classList.toggle('hidden', current !== questions.length - 1);

  const q = questions[current];
  qText.textContent = `Q${current+1}. ${q.q}`;
  optionsBox.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = opt;
    div.onclick = () => selectOption(idx, div);
    optionsBox.appendChild(div);
  });

  startTimer();
}

function startTimer(){
  clearInterval(timer);
  timeLeft = TIME_PER_Q;
  timerPill.textContent = `⏱ ${timeLeft}s`;
  timerPill.classList.remove('warn');
  timer = setInterval(() => {
    timeLeft--;
    timerPill.textContent = `⏱ ${timeLeft}s`;
    if (timeLeft <= 10) timerPill.classList.add('warn');
    if (timeLeft <= 0){
      clearInterval(timer);
      handleTimeout();
    }
  }, 1000);
}

function handleTimeout(){
  // treat as a wrong attempt with no option selected
  processAnswer(-1, null);
}

function selectOption(idx, el){
  clearInterval(timer);
  const opts = optionsBox.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  processAnswer(idx, el);
}

function processAnswer(idx, el){
  const q = questions[current];
  const isCorrect = idx === q.answer;

  if (isCorrect){
    if (el) el.classList.add('correct');
    score++;
    scorePill.textContent = `Score: ${score} / ${questions.length}`;
    playSound('correctSound');
    burstStars();
    setTimeout(nextQuestion, 1200);
    return;
  }

  // wrong answer
  attempts++;
  if (el) el.classList.add('wrong');
  playSound('wrongSound');
  showCross();

  if (attempts === 1){
    // allow retry
    feedbackBox.innerHTML = "Not quite — try again! 🌈";
    feedbackBox.classList.add('show');
    const opts = optionsBox.querySelectorAll('.option');
    opts.forEach((o,i) => {
      if (i !== idx) o.classList.remove('disabled');
    });
    startTimer();
  } else {
    // second wrong attempt -> reveal answer + explanation
    const opts = optionsBox.querySelectorAll('.option');
    opts.forEach((o,i) => {
      o.classList.add('disabled');
      if (i === q.answer) o.classList.add('correct');
    });
    feedbackBox.innerHTML = `<strong>Correct answer:</strong> ${q.options[q.answer]}<br><br>${q.explain}`;
    feedbackBox.classList.add('show');
    nextBtn.style.display = 'inline-block';
  }
}

function nextQuestion(){
  current++;
  if (current >= questions.length){
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult(){
  gameScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');
  document.getElementById('resultScore').textContent = `${score} / ${questions.length}`;
  let msg = '';
  let emoji = '🎉';
  const pct = score / questions.length;
  if (pct >= 0.8){ msg = "Excellent work! You really know your plurals!"; emoji='🏆'; }
  else if (pct >= 0.5){ msg = "Good job! A little more practice and you'll master it."; emoji='🎉'; }
  else { msg = "Nice try! Practice a bit more and you'll get there."; emoji='🌈'; }
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultEmoji').textContent = emoji;
  playSound('clapSound');
}

function restartGame(){
  resultScreen.classList.add('hidden');
  startScreen.classList.remove('hidden');
}

function playSound(id){
  const el = document.getElementById(id);
  if (!el) return;
  el.currentTime = 0;
  el.play().catch(()=>{});
}

/* ---------------- Star confetti ---------------- */
function burstStars(){
  for (let i=0;i<14;i++){
    const star = document.createElement('div');
    star.className = 'star';
    const angle = Math.random()*2*Math.PI;
    const dist = 80 + Math.random()*120;
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist;
    star.style.background = balloonColors[i % balloonColors.length];
    document.body.appendChild(star);
    star.animate([
      { transform: 'translate(-50%,-50%) scale(0.5)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.1) rotate(180deg)`, opacity: 0 }
    ], { duration: 900, easing: 'ease-out' });
    setTimeout(() => star.remove(), 900);
  }
}

/* ---------------- Red cross overlay ---------------- */
function showCross(){
  const overlay = document.getElementById('crossOverlay');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 650);
}
</script>
</body>
</html>
