<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>This, That, These, Those Challenge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    overflow-x: hidden;
    background: linear-gradient(135deg,#e8d9a0,#c8e6c0,#f0e0a8,#d9c98a);
    background-size: 400% 400%;
    animation: bgShift 18s ease infinite;
  }
  @keyframes bgShift {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  /* floating leaves */
  .leaf {
    position: fixed;
    bottom: -120px;
    border-radius: 0 100% 0 100%;
    opacity: 0.5;
    z-index: 0;
    pointer-events: none;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) rotate(0deg); }
    50% { transform: translateY(-55vh) translateX(20px) rotate(90deg); }
    100% { transform: translateY(-115vh) translateX(-14px) rotate(180deg); }
  }

  /* paw print trail */
  .paw {
    position: fixed;
    top: -30px;
    font-size: 18px;
    opacity: 0.45;
    z-index: 0;
    pointer-events: none;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(115vh) rotate(30deg); }
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #logoScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,#e8d9a0,#c8e6c0);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.6s ease;
  }
  #logoScreen img {
    width: 160px;
    max-width: 60vw;
    animation: pop 1s ease;
    background: #fff;
    border-radius: 16px;
    padding: 10px;
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  #logoScreen.hide { opacity: 0; pointer-events: none; }

  .card {
    background: rgba(255,255,250,0.94);
    border-radius: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    padding: 28px 22px;
    width: 100%;
    text-align: center;
    border: 3px solid #d9a441;
  }

  h1 {
    font-size: 1.5rem;
    color: #6b4423;
    margin-bottom: 6px;
  }
  .meta {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 18px;
  }
  .btn {
    background: linear-gradient(135deg,#d9a441,#8fbf6b);
    border: none;
    color: #fff;
    font-weight: bold;
    padding: 14px 30px;
    border-radius: 30px;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(143,191,107,0.4);
    transition: transform 0.15s ease;
  }
  .btn:active { transform: scale(0.95); }

  .hidden { display: none !important; }

  .topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-weight: bold;
    font-size: 0.95rem;
    color: #fff;
    background: #6b4423;
    padding: 10px 14px;
    border-radius: 14px;
  }
  .score-pill, .timer-pill {
    background: #4a2f18;
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid #d9a441;
  }
  .timer-pill.warn { color: #ff5c5c; border-color: #ff5c5c; }

  .final-banner {
    background: linear-gradient(135deg,#d9a441,#8fbf6b);
    color: #fff;
    font-weight: bold;
    padding: 8px;
    border-radius: 14px;
    margin-bottom: 12px;
    font-size: 0.9rem;
  }

  .qtext {
    font-size: 1.08rem;
    color: #333;
    margin-bottom: 18px;
    line-height: 1.4;
    text-align: left;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .option {
    background: #f8f5e8;
    border: 2px solid #e0d0a0;
    border-radius: 14px;
    padding: 12px 14px;
    text-align: left;
    font-size: 0.98rem;
    cursor: pointer;
    transition: all 0.15s ease;
    color: #444;
  }
  .option:hover { border-color: #8fbf6b; }
  .option.correct {
    background: #d9ffe0;
    border-color: #4CAF50;
    color: #1b6b2c;
    font-weight: bold;
  }
  .option.wrong {
    background: #ffe1e1;
    border-color: #ff5c5c;
    color: #a80000;
  }
  .option.disabled { pointer-events: none; opacity: 0.75; }

  .feedback {
    margin-top: 14px;
    font-size: 0.92rem;
    color: #444;
    background: #fff3d6;
    border-radius: 12px;
    padding: 10px 12px;
    text-align: left;
    display: none;
    border-left: 4px solid #d9a441;
  }
  .feedback.show { display: block; }

  .nextBtn { margin-top: 16px; display:none; }

  #crossOverlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    pointer-events: none;
  }
  #crossOverlay svg {
    width: 90px;
    height: 90px;
    opacity: 0;
  }
  #crossOverlay.show svg {
    animation: crossPop 0.6s ease forwards;
  }
  @keyframes crossPop {
    0% { opacity: 0; transform: scale(0.4); }
    50% { opacity: 1; transform: scale(1.15); }
    100% { opacity: 0; transform: scale(1); }
  }

  .star {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 14px;
    background: #d9a441;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    z-index: 500;
    pointer-events: none;
  }

  .result-emoji { font-size: 3rem; margin-bottom: 6px; }
  .result-score { font-size: 1.4rem; color: #6b4423; font-weight: bold; margin: 10px 0; }
  .result-msg { color: #555; margin-bottom: 18px; }
</style>
</head>
<body>

<div id="logoScreen">
  <img src="assets/logo.png" alt="Innovine">
</div>

<div id="bgLayer"></div>

<div id="crossOverlay">
  <svg viewBox="0 0 100 100">
    <line x1="15" y1="15" x2="85" y2="85" stroke="#ff3b3b" stroke-width="12" stroke-linecap="round"/>
    <line x1="85" y1="15" x2="15" y2="85" stroke="#ff3b3b" stroke-width="12" stroke-linecap="round"/>
  </svg>
</div>

<div class="container">

  <div class="card" id="startScreen">
    <h1>🦁 This, That, These, Those Challenge</h1>
    <div class="meta">Grade 2 &nbsp;|&nbsp; English &nbsp;|&nbsp; Topic: This, That, These, Those</div>
    <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">
      15 questions &nbsp;•&nbsp; 60 seconds each &nbsp;•&nbsp; One retry if you get it wrong!
    </p>
    <button class="btn" onclick="startGame()">Start Safari 🐾</button>
  </div>

  <div class="card hidden" id="gameScreen">
    <div class="topbar">
      <div class="score-pill" id="scorePill">Score: 0 / 15</div>
      <div class="timer-pill" id="timerPill">⏱ 60s</div>
    </div>
    <div id="finalBanner" class="final-banner hidden">🔭 Final Challenge!</div>
    <div class="qtext" id="qText"></div>
    <div class="options" id="optionsBox"></div>
    <div class="feedback" id="feedbackBox"></div>
    <button class="btn nextBtn" id="nextBtn" onclick="nextQuestion()">Next ➜</button>
  </div>

  <div class="card hidden" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🦒</div>
    <h1>Safari Complete!</h1>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn" onclick="restartGame()">Play Again 🔄</button>
  </div>

</div>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<script>
const bgLayer = document.getElementById('bgLayer');
const safariColors = ['#8fbf6b','#d9a441','#c8e6c0','#e0b04a'];
for (let i=0;i<8;i++){
  const b = document.createElement('div');
  b.className='leaf';
  const size = 18 + Math.random()*14;
  b.style.width = size+'px';
  b.style.height = size+'px';
  b.style.left = Math.random()*100+'vw';
  b.style.background = safariColors[i % safariColors.length];
  b.style.animationDuration = (14+Math.random()*10)+'s';
  b.style.animationDelay = (Math.random()*10)+'s';
  bgLayer.appendChild(b);
}
for (let i=0;i<6;i++){
  const s = document.createElement('div');
  s.className='paw';
  s.textContent = '🐾';
  s.style.left = Math.random()*100+'vw';
  s.style.animationDuration = (9+Math.random()*8)+'s';
  s.style.animationDelay = (Math.random()*8)+'s';
  bgLayer.appendChild(s);
}

window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('logoScreen').classList.add('hide');
  }, 5000);
});

const questions = [
{ q:"At a book fair, you are holding one storybook in your hand and showing it to your cousin. Which sentence would you say?",
  options:["Those are my favourite stories.","That is my favourite storybook.","These are my favourite storybook.","This is my favourite storybook."],
  answer:3, explain:"'This' is used for one thing that is near you." },
{ q:"Which sentence does NOT follow the same demonstrative pattern as the others?",
  options:["These mangoes are sweet.","These crayons belong to me.","These notebooks are neatly arranged.","This balloons are colourful."],
  answer:3, explain:"'This' is singular but 'balloons' is plural — it should be 'These balloons'." },
{ q:"A student says: \"I used 'those' because I was talking about several kites flying high in the sky.\" Why is this a good choice?",
  options:["Because \"those\" is used for many things that are far away.","Because \"those\" is used for one thing nearby.","Because \"those\" is used only for people.","Because \"those\" is always used before colours."],
  answer:0, explain:"'Those' is correctly used for plural things that are far from the speaker." },
{ q:"While waiting for a train, you see a group of passengers standing at the far end of the platform. Which sentence would be most suitable?",
  options:["These passengers are waiting quietly.","This passenger is waiting quietly.","Those passengers are waiting quietly.","That passengers are waiting quietly."],
  answer:2, explain:"'Those' fits since the passengers are plural and far away." },
{ q:"Statement: We use \"this\" for one thing that is near us. Reason: \"This\" refers to a singular noun that is close to the speaker.",
  options:["The reason is correct and explains the statement","The reason is correct but does not explain the statement","The reason is wrong but the statement is correct","Both the reason and the statement are wrong"],
  answer:0, explain:"The reason correctly explains why 'this' is used for near, singular things." },
{ q:"Which sentence shows incorrect understanding of demonstratives?",
  options:["This model shows how a volcano erupts.","Those charts on the wall explain the solar system.","These microscope is working properly.","These models were made by Class 2 students."],
  answer:2, explain:"'These' is plural but 'microscope' is singular — it should be 'This microscope'." },
{ q:"Which sentence shows correct understanding of demonstratives?",
  options:["I would use \"that\" for a monument I can see across the road.","I would use \"this\" for several trees in a distant field.","I would use \"these\" for one pencil in my hand.","I would use \"those\" for one nearby flower."],
  answer:0, explain:"'That' correctly refers to something singular and far away." },
{ q:"Which sentence is incorrect?",
  options:["These laddoos were made by my grandmother.","That temple is over 200 years old.","Those children are playing kho-kho.","This books belong to the school library."],
  answer:3, explain:"'This' is singular but 'books' is plural — it should be 'These books'." },
{ q:"During a zoo visit, you are standing near the rabbit enclosure and talking about two rabbits right in front of you. Which sentence would you say?",
  options:["Those rabbits are eating carrots.","These rabbits are eating carrots.","That rabbits are eating carrots.","This rabbits are eating carrots."],
  answer:1, explain:"'These' is correct for plural things that are near you." },
{ q:"A student writes: \"Those kite is flying above the playground.\" What should be corrected?",
  options:["Those → This","kite → kites","Those → That","flying → flies"],
  answer:2, explain:"'Kite' is singular, so it should match with 'That', not 'Those'." },
{ q:"While visiting a museum, your guide points to an ancient sword kept inside a glass case across the room. Which sentence is most suitable?",
  options:["This sword was used by a warrior.","These swords were used by warriors.","That sword was used by a warrior.","Those sword was used by a warrior."],
  answer:2, explain:"'That' is correct for something singular and far from the speaker." },
{ q:"Words: this book, that building, these chairs, those child. Which option does not belong?",
  options:["this book","that building","these chairs","those child"],
  answer:3, explain:"'Those' is plural but 'child' is singular — it should be 'those children'." },
{ q:"Why is \"these\" used in the sentence: \"These seedlings need water every day.\"",
  options:["Because more than one seedling is being talked about nearby.","Because one seedling is far away.","Because seedlings are plants.","Because water is important for plants."],
  answer:0, explain:"'These' correctly refers to multiple seedlings that are nearby." },
{ q:"Statement: We use \"those\" for things that are far away and more than one. Reason: \"Those\" refers to plural nouns at a distance.",
  options:["Both are correct and the reason explains the statement","Both are correct but not related","Statement is correct, reason is wrong","Statement is wrong, reason is correct"],
  answer:0, explain:"The reason correctly explains why 'those' is used for distant, plural things." },
{ q:"You are watching a kite festival from your terrace. Several colourful kites are flying high above the neighbourhood. Which sentence would you most likely say?",
  options:["These kites are flying above my hand.","This kite is flying above the neighbourhood.","Those kites look beautiful in the sky.","That kites look beautiful in the sky."],
  answer:2, explain:"'Those' correctly matches plural kites that are far away in the sky." }
];

let current = 0;
let score = 0;
let attempts = 0;
let timer = null;
let timeLeft = 60;
const TIME_PER_Q = 60;

const startScreen = document.getElementById('startScreen');
const gameScreen = document.getElementById('gameScreen');
const resultScreen = document.getElementById('resultScreen');
const qText = document.getElementById('qText');
const optionsBox = document.getElementById('optionsBox');
const scorePill = document.getElementById('scorePill');
const timerPill = document.getElementById('timerPill');
const feedbackBox = document.getElementById('feedbackBox');
const nextBtn = document.getElementById('nextBtn');
const finalBanner = document.getElementById('finalBanner');

function startGame(){
  startScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  current = 0; score = 0;
  loadQuestion();
}

function loadQuestion(){
  attempts = 0;
  feedbackBox.classList.remove('show');
  feedbackBox.innerHTML = '';
  nextBtn.style.display = 'none';
  scorePill.textContent = `Score: ${score} / ${questions.length}`;
  finalBanner.classList.toggle('hidden', current !== questions.length - 1);

  const q = questions[current];
  qText.textContent = `Q${current+1}. ${q.q}`;
  optionsBox.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = opt;
    div.onclick = () => selectOption(idx, div);
    optionsBox.appendChild(div);
  });

  startTimer();
}

function startTimer(){
  clearInterval(timer);
  timeLeft = TIME_PER_Q;
  timerPill.textContent = `⏱ ${timeLeft}s`;
  timerPill.classList.remove('warn');
  timer = setInterval(() => {
    timeLeft--;
    timerPill.textContent = `⏱ ${timeLeft}s`;
    if (timeLeft <= 10) timerPill.classList.add('warn');
    if (timeLeft <= 0){
      clearInterval(timer);
      handleTimeout();
    }
  }, 1000);
}

function handleTimeout(){
  processAnswer(-1, null);
}

function selectOption(idx, el){
  clearInterval(timer);
  const opts = optionsBox.querySelectorAll('.option');
  opts.forEach(o => o.classList.add('disabled'));
  processAnswer(idx, el);
}

function processAnswer(idx, el){
  const q = questions[current];
  const isCorrect = idx === q.answer;

  if (isCorrect){
    if (el) el.classList.add('correct');
    score++;
    scorePill.textContent = `Score: ${score} / ${questions.length}`;
    playSound('correctSound');
    burstStars();
    setTimeout(nextQuestion, 1200);
    return;
  }

  attempts++;
  if (el) el.classList.add('wrong');
  playSound('wrongSound');
  showCross();

  if (attempts === 1){
    feedbackBox.innerHTML = "Not quite — look again and try once more! 🔍";
    feedbackBox.classList.add('show');
    const opts = optionsBox.querySelectorAll('.option');
    opts.forEach((o,i) => {
      if (i !== idx) o.classList.remove('disabled');
    });
    startTimer();
  } else {
    const opts = optionsBox.querySelectorAll('.option');
    opts.forEach((o,i) => {
      o.classList.add('disabled');
      if (i === q.answer) o.classList.add('correct');
    });
    feedbackBox.innerHTML = `<strong>Correct answer:</strong> ${q.options[q.answer]}<br><br>${q.explain}`;
    feedbackBox.classList.add('show');
    nextBtn.style.display = 'inline-block';
  }
}

function nextQuestion(){
  current++;
  if (current >= questions.length){
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult(){
  gameScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');
  document.getElementById('resultScore').textContent = `${score} / ${questions.length}`;
  let msg = '';
  let emoji = '🦒';
  const pct = score / questions.length;
  if (pct >= 0.8){ msg = "Amazing safari guide skills! You spotted them all!"; emoji='🏆'; }
  else if (pct >= 0.5){ msg = "Good tracking! A little more practice and you'll be an expert guide."; emoji='🦁'; }
  else { msg = "Nice try! Keep exploring and you'll spot the pattern soon."; emoji='🐘'; }
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultEmoji').textContent = emoji;
  playSound('clapSound');
}

function restartGame(){
  resultScreen.classList.add('hidden');
  startScreen.classList.remove('hidden');
}

function playSound(id){
  const el = document.getElementById(id);
  if (!el) return;
  el.currentTime = 0;
  el.play().catch(()=>{});
}

function burstStars(){
  for (let i=0;i<14;i++){
    const star = document.createElement('div');
    star.className = 'star';
    const angle = Math.random()*2*Math.PI;
    const dist = 80 + Math.random()*120;
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist;
    star.style.background = safariColors[i % safariColors.length];
    document.body.appendChild(star);
    star.animate([
      { transform: 'translate(-50%,-50%) scale(0.5)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.1) rotate(180deg)`, opacity: 0 }
    ], { duration: 900, easing: 'ease-out' });
    setTimeout(() => star.remove(), 900);
  }
}

function showCross(){
  const overlay = document.getElementById('crossOverlay');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 650);
}
</script>
</body>
</html>
