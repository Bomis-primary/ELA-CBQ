<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preposition Quest - Grade 4</title>
    <style>
        :root {
            --primary: #4a3ef5;
            --primary-light: #7066f8;
            --secondary: #06b6d4;
            --background: #f0f4f9;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Animations */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .streamer {
            position: absolute;
            background: linear-gradient(45deg, rgba(74, 62, 245, 0.1), rgba(6, 182, 212, 0.1));
            border-radius: 50%;
            animation: float 25s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(-10vw) rotate(0deg); }
            100% { transform: translateY(-10vh) translateX(110vw) rotate(360deg); }
        }

        /* Container & Cards */
        .game-container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            z-index: 10;
        }

        .card {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            position: relative;
        }

        /* Screen States */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Splash Screen */
        #splash-screen {
            text-align: center;
            padding: 50px 20px;
        }

        .logo-container img {
            max-width: 220px;
            height: auto;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Header / Trackers */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
        }

        .tracker-item {
            background: #f8fafc;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #e2e8f0;
        }

        .tracker-item span {
            color: var(--primary);
        }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 0.1s linear;
        }

        /* Question & Context Passage */
        .passage-box {
            background: #f8fafc;
            border-left: 4px solid var(--secondary);
            padding: 15px 20px;
            border-radius: 0 12px 12px 0;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #334155;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-light);
            background: #f5f3ff;
            transform: translateY(-2px);
        }

        .option-btn:disabled { cursor: not-allowed; }

        /* Dynamic Feedback Visual States */
        .option-btn.correct {
            background-color: #ecfdf5 !important;
            border-color: var(--success) !important;
            color: #065f46 !important;
        }

        .option-btn.wrong {
            background-color: #fef2f2 !important;
            border-color: var(--error) !important;
            color: #991b1b !important;
        }

        /* Cross Indicator Layer */
        .option-btn.wrong::after {
            content: "✕";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--error);
            font-weight: bold;
        }

        /* Feedback Boxes */
        .feedback-box {
            display: none;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-weight: 500;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .feedback-box.retry {
            display: block;
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: #92400e;
        }

        .feedback-box.explanation {
            display: block;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        /* Buttons & Interface */
        .action-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 62, 245, 0.3);
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 62, 245, 0.4);
        }

        /* Confetti Stars */
        .confetti-star {
            position: absolute;
            color: #fbbf24;
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Settings */
        @media (max-width: 480px) {
            .card { padding: 20px; }
            .game-header { font-size: 0.85rem; }
            .passage-box { font-size: 0.95rem; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg" id="ambient-layer"></div>

    <div class="game-container">
        <div id="splash-screen" class="card screen active">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Innovine Logo">
            </div>
            <h2 style="margin-top:25px; font-size:1.8rem;">Preposition Quest</h2>
            <p style="color:var(--text-light); margin: 15px 0 30px 0;">Master spatial and time context clues!</p>
            <button class="action-btn" id="start-btn" style="display:none;" onclick="startChallenge()">Begin Challenge</button>
            <p id="loading-msg" style="color: var(--text-light); font-style: italic;">Loading adventure platform...</p>
        </div>

        <div id="quiz-screen" class="card screen">
            <div class="game-header">
                <div class="tracker-item">Question: <span id="q-current">1</span>/<span id="q-total">13</span></div>
                <div class="tracker-item">Score: <span id="score-val">00</span></div>
            </div>

            <div class="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>

            <div class="passage-box" id="passage-text">Passage script loads here...</div>
            <div class="question-text" id="question-text">Target Question fills here...</div>

            <div class="options-grid" id="options-box"></div>

            <div class="feedback-box" id="feedback-message"></div>
            
            <button class="action-btn" id="next-btn" style="display:none; margin-top: 15px;" onclick="handleNextStep()">Continue</button>
        </div>

        <div id="result-screen" class="card screen" style="text-align: center;">
            <h2 style="font-size: 2rem; color: var(--primary); margin-bottom: 10px;">Mission Complete!</h2>
            <p style="color: var(--text-light); margin-bottom: 30px;">Let's evaluate your grammar precision metrics</p>
            
            <div style="margin: 25px 0;">
                <span id="final-score" style="font-size: 4rem; font-weight: 800; color: var(--text);">0</span>
                <span style="font-size: 2rem; color: var(--text-light);">/13</span>
            </div>

            <div id="performance-commentary" style="font-size: 1.1rem; margin-bottom: 30px; font-weight: 500; padding: 0 15px;"></div>

            <button class="action-btn" onclick="restartGame()">Restart Experience</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                passage: "It was the first day of school. The teacher asked the students to keep their bags beside their desks. Riya placed her water bottle on the table, while Aarav kept his lunch box inside his school bag. The teacher smiled because everyone kept the classroom neat and tidy.",
                question: "Riya kept her water bottle ______ the table.",
                options: ["under", "between", "behind", "on"],
                answer: "on",
                explanation: "The passage notes Riya 'placed her water bottle on the table', indicating direct physical contact with the upper flat surface."
            },
            {
                passage: "Maya celebrated her birthday with her friends. Balloons were hanging above the dining table, and gifts were kept under the table. The birthday cake was in the centre of the table. Everyone gathered around the table to sing 'Happy Birthday.'",
                question: "The balloons were hanging ______ the dining table.",
                options: ["above", "below", "behind", "inside"],
                answer: "above",
                explanation: "The text outlines that the balloons were hanging higher than or overhead relative to the dining layout, making 'above' correct."
            },
            {
                passage: "The librarian arranged the books carefully on the shelves. Storybooks were placed next to the science books. A globe stood near the reading corner, and students sat quietly on the chairs while reading.",
                question: "The storybooks were placed ______ the science books.",
                options: ["behind", "next to", "under", "across"],
                answer: "next to",
                explanation: "The narrator explicitly confirms that storybooks were located directly adjacent or side-by-side to science books using 'next to'."
            },
            {
                passage: "Every school day, Rohan wakes up at 6:30 a.m. He brushes his teeth, eats breakfast, and leaves for school at 7:30 a.m. His classes begin at 8:00 a.m., and he returns home in the afternoon.",
                question: "Rohan wakes up ______ 6:30 a.m.",
                options: ["in", "on", "at", "by"],
                answer: "at",
                explanation: "We implement the specific preposition 'at' when referencing pinpointed clock times such as 6:30 a.m."
            },
            {
                passage: "The children were excited about the Diwali celebration. They decorated their homes in the evening and lit lamps at night. The family planned to visit their grandparents on Sunday morning to celebrate together.",
                question: "The family planned to visit their grandparents ______ Sunday morning.",
                options: ["in", "at", "on", "by"],
                answer: "on",
                explanation: "Specific dates, days of the week, and specific day variations (like Sunday morning) require the preposition 'on'."
            },
            {
                passage: "During the summer holidays, Neha visited her cousins. They played outdoor games in the morning, read books in the afternoon, and watched movies at night. Every day was full of fun and laughter.",
                question: "They played games ______ the morning.",
                options: ["on", "over", "at", "in"],
                answer: "in",
                explanation: "Standard periods or divisions of a standard full day require the structure 'in the morning'."
            },
            {
                passage: "The Grade 4 students visited the city zoo. As they entered through the main gate, they walked towards the bird enclosure first. Later, they moved across the bridge to see the elephants. Finally, they returned to the entrance before leaving.",
                question: "The students walked ______ the bird enclosure first.",
                options: ["towards", "under", "between", "inside"],
                answer: "towards",
                explanation: "The path vector indicates movement heading in the direct orientation or line of the bird section, thus 'towards'."
            },
            {
                passage: "Before crossing the road, Anya looked to her right and then to her left. She walked across the zebra crossing with her father. After reaching the other side safely, they continued towards the park.",
                question: "Anya walked ______ the zebra crossing.",
                options: ["over", "across", "behind", "beside"],
                answer: "across",
                explanation: "To navigate safely from one distinct bounded lateral side of a road grid to another, we apply 'across'."
            },
            {
                passage: "The teacher organised a treasure hunt in the playground. The first clue asked the students to walk towards the old tree. The second clue was hidden behind a large rock. Finally, they found the treasure inside a small wooden box.",
                question: "The second clue was hidden ______ a large rock.",
                options: ["beside", "behind", "above", "across"],
                answer: "behind",
                explanation: "The passage notes the target data was located at the rear or back surface alignment of the rock object, meaning 'behind'."
            },
            {
                passage: "The children visited a large aquarium. Colourful fish swam inside the glass tanks. A starfish rested at the bottom of one tank, while tiny turtles floated near the surface. Everyone enjoyed watching the sea animals.",
                question: "The fish swam ______ the glass tanks.",
                options: ["inside", "behind", "over", "across"],
                answer: "inside",
                explanation: "Because the wildlife is contained entirely within the interior boundaries of the glass infrastructure, 'inside' is correct."
            },
            {
                passage: "The school football team practised every evening. The coach asked the players to arrive before 5:00 p.m. so that practice could begin on time. They trained until sunset and then went home.",
                question: "The players had to arrive ______ 5:00 p.m.",
                options: ["in", "under", "on", "before"],
                answer: "before",
                explanation: "The schedule criteria marks arrival prior to or earlier than the designated time marker of 5:00 p.m., using 'before'."
            },
            {
                passage: "The students entered the museum through the front gate. They walked into the dinosaur gallery first and then moved towards the space exhibition. After exploring all the rooms, they came out through the exit door.",
                question: "The students walked ______ the dinosaur gallery first.",
                options: ["into", "over", "beside", "behind"],
                answer: "into",
                explanation: "Entering an enclosed interior layout or multi-dimensional physical space translates into using 'into'."
            },
            {
                passage: "During recess, the children played happily in the playground. Some students sat under a big tree to eat their snacks. Others played football between two goalposts. Their teacher watched them from a bench near the playground.",
                question: "Some students sat ______ a big tree to eat their snacks.",
                options: ["between", "under", "above", "across"],
                answer: "under",
                explanation: "Positioned directly beneath or covered horizontally by the overarching branches of a tree dictates the preposition 'under'."
            }
        ];

        // System Constants & Internal States
        const TIME_LIMIT = 45; // Grade 4 Specific constraint rules
        let currentIdx = 0;
        let score = 0;
        let timerInterval = null;
        let remainingTime = TIME_LIMIT;
        let errorCountForCurrentQuestion = 0;
        let audioConfigured = true;

        // Audio Elements
        const soundCorrect = new Audio('assets/correct.mp3');
        const soundWrong = new Audio('assets/wrong.mp3');
        const soundClaps = new Audio('assets/freesound_community-claps-44774.mp3');

        // Initial setup on Window activation
        window.addEventListener('DOMContentLoaded', () => {
            generateAmbientStreamers();
            
            // Automatic 5-second brand requirement flow
            setTimeout(() => {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
            }, 5000);
        });

        function generateAmbientStreamers() {
            const layer = document.getElementById('ambient-layer');
            for(let i = 0; i < 12; i++) {
                const streamer = document.createElement('div');
                streamer.className = 'streamer';
                const size = Math.random() * 40 + 20;
                streamer.style.width = `${size}px`;
                streamer.style.height = `${size}px`;
                streamer.style.left = `${Math.random() * 100}vw`;
                streamer.style.animationDelay = `${Math.random() * 20}s`;
                streamer.style.animationDuration = `${Math.random() * 15 + 15}s`;
                layer.appendChild(streamer);
            }
        }

        function startChallenge() {
            document.getElementById('splash-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            document.getElementById('q-total').textContent = quizData.length;
            loadQuestion();
        }

        function loadQuestion() {
            errorCountForCurrentQuestion = 0;
            const item = quizData[currentIdx];
            
            // Layout fields updating
            document.getElementById('q-current').textContent = currentIdx + 1;
            document.getElementById('passage-text').textContent = item.passage;
            document.getElementById('question-text').textContent = "Question: " + item.question;
            document.getElementById('next-btn').style.display = 'none';
            
            const msgBox = document.getElementById('feedback-message');
            msgBox.className = 'feedback-box';
            msgBox.style.display = 'none';

            // Build Options View Layer
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            item.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswerSelection(btn, opt);
                box.appendChild(btn);
            });

            // Timer management initiation
            remainingTime = TIME_LIMIT;
            updateTimerDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                remainingTime--;
                updateTimerDisplay();
                if(remainingTime <= 0) {
                    clearInterval(timerInterval);
                    handleTimeOut();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const bar = document.getElementById('timer-bar');
            const percentage = (remainingTime / TIME_LIMIT) * 100;
            bar.style.width = `${percentage}%`;
            
            if (percentage < 30) {
                bar.style.background = 'var(--error)';
            } else if (percentage < 60) {
                bar.style.background = 'var(--warning)';
            } else {
                bar.style.background = 'linear-gradient(90deg, var(--secondary), var(--primary))';
            }
        }

        function triggerConfetti(targetBtn) {
            const rect = targetBtn.getBoundingClientRect();
            const container = document.body;
            
            for(let i=0; i<15; i++) {
                const star = document.createElement('div');
                star.className = 'confetti-star';
                star.innerHTML = '★';
                star.style.left = `${rect.left + rect.width/2}px`;
                star.style.top = `${rect.top + rect.height/2}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                star.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
                star.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                
                container.appendChild(star);
                setTimeout(() => star.remove(), 600);
            }
        }

        function checkAnswerSelection(selectedBtn, selectedValue) {
            const currentItem = quizData[currentIdx];
            const msgBox = document.getElementById('feedback-message');
            
            if (selectedValue === currentItem.answer) {
                // Correct Pathway Handling
                clearInterval(timerInterval);
                selectedBtn.classList.add('correct');
                score++;
                document.getElementById('score-val').textContent = score < 10 ? '0' + score : score;
                triggerConfetti(selectedBtn);
                
                try { soundCorrect.play(); } catch(e){}

                disableAllOptions();
                
                msgBox.textContent = "Excellent! You analyzed the context clues correctly.";
                msgBox.className = "feedback-box explanation";
                document.getElementById('next-btn').style.display = 'block';
            } else {
                // Wrong Pathway Handling
                errorCountForCurrentQuestion++;
                selectedBtn.classList.add('wrong');
                selectedBtn.disabled = true;
                
                try { soundWrong.play(); } catch(e){}

                if(errorCountForCurrentQuestion === 1) {
                    // Opportunity for one extra execution attempt
                    msgBox.textContent = "Not quite! Check the sentence details closely. You have 1 attempt remaining.";
                    msgBox.className = "feedback-box retry";
                } else {
                    // Second failed scenario forces transition with full clear brief explanations 
                    clearInterval(timerInterval);
                    disableAllOptions();
                    highlightCorrectAnswer(currentItem.answer);
                    
                    msgBox.innerHTML = `<strong>Incorrect.</strong> ${currentItem.explanation}`;
                    msgBox.className = "feedback-box explanation";
                    document.getElementById('next-btn').style.display = 'block';
                }
            }
        }

        function handleTimeOut() {
            disableAllOptions();
            const currentItem = quizData[currentIdx];
            highlightCorrectAnswer(currentItem.answer);
            
            const msgBox = document.getElementById('feedback-message');
            msgBox.innerHTML = `<strong>Time's up!</strong> ${currentItem.explanation}`;
            msgBox.className = "feedback-box explanation";
            document.getElementById('next-btn').style.display = 'block';
            try { soundWrong.play(); } catch(e){}
        }

        function highlightCorrectAnswer(correctValue) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if(btn.textContent === correctValue) {
                    btn.classList.add('correct');
                }
            });
        }

        function disableAllOptions() {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);
        }

        function handleNextStep() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showFinalResults();
            }
        }

        function showFinalResults() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            
            document.getElementById('final-score').textContent = score;
            const commentary = document.getElementById('performance-commentary');
            
            if(score === quizData.length) {
                commentary.textContent = "Flawless score! You have completely mastered English prepositions.";
                try { soundClaps.play(); } catch(e){}
            } else if(score >= 10) {
                commentary.textContent = "Terrific performance! Your understanding of situational syntax is strong.";
                try { soundClaps.play(); } catch(e){}
            } else if(score >= 6) {
                commentary.textContent = "Good try! Review the specific prepositions of space and time to improve further.";
            } else {
                commentary.textContent = "Keep practicing! Review grammar context structures and test again.";
            }
        }

        function restartGame() {
            currentIdx = 0;
            score = 0;
            document.getElementById('score-val').textContent = "00";
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            loadQuestion();
        }
    </script>
</body>
</html>
