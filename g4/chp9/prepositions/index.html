<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grade 4 - Prepositions</title>

<style>
:root{--bg1:#1f6b3d;--bg2:#4ea85a;--bg3:#9bdd7d;--card:#fbfff8;--ink:#17321f;--good:#24c07a;--bad:#ff6d7a;--line:#d8ead8;--shadow:0 22px 52px rgba(20,58,24,.22)}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--ink);
  overflow-x:hidden;
  background:
    radial-gradient(circle at 18% 20%, rgba(255,255,255,.18) 0 7%, transparent 8%),
    radial-gradient(circle at 78% 14%, rgba(255,255,255,.16) 0 6%, transparent 7%),
    linear-gradient(160deg,var(--bg1),var(--bg2) 55%, var(--bg3));
}
.card-wrap{max-width:1080px;margin:0 auto;padding:14px}
.card{min-height:calc(100vh - 28px);background:var(--card);border-radius:30px;overflow:hidden;box-shadow:var(--shadow)}
.screen{display:none;padding:18px}
.screen.active{display:block}

.logo-wrap{
  width:220px;height:220px;
  border-radius:34px;
  overflow:hidden;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo-wrap img{
  width:92%;
  height:92%;
  object-fit:contain;
}
</style>
</head>

<body>

<div class="card-wrap">
<div class="card">

<!-- SPLASH -->
<div class="screen active" id="splashScreen">
  <div class="logo-wrap">
    <!-- ✅ FIXED LOGO PATH -->
    <img src="./g4/chp9/prepositions/assets/logo.png" alt="Innovine logo">
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="screen" id="quizScreen">
  <h2 id="questionText"></h2>
  <div id="optionsBox"></div>
</div>

</div>
</div>

<script>

//////////////////////////////////////////////////////
// ✅ AUDIO FIX (ONLY ADDITION — NOTHING ELSE CHANGED)
//////////////////////////////////////////////////////

let audioUnlocked = false;

document.addEventListener("click", () => {
  audioUnlocked = true;
}, { once: true });

function playAudio(src){
  if(!audioUnlocked) return;
  const audio = new Audio(src);
  audio.volume = 1;
  audio.play().catch(()=>{});
}

//////////////////////////////////////////////////////
// ORIGINAL DATA (UNCHANGED)
//////////////////////////////////////////////////////

const quizData = [
  { q:`1.It was the first day of school. The teacher asked the students to keep their bags beside their desks. Riya placed her water bottle on the table, while Aarav kept his lunch box inside his school bag. The teacher smiled because everyone kept the classroom neat and tidy.
Question:
Which preposition best completes the sentence based on the passage?
Riya kept her water bottle ______ the table.
a) under
b) between
c) behind
d) on
Answer: d) on`, o:["under","between","behind","on"], a:3, e:"On shows the bottle was placed on top of the table." },

  { q:`2. Maya celebrated her birthday with her friends. Balloons were hanging above the dining table, and gifts were kept under the table. The birthday cake was in the centre of the table. Everyone gathered around the table to sing "Happy Birthday."
Question:
Which preposition best completes the sentence?
The balloons were hanging ______ the dining table.
a) above
b) below
c) behind
d) inside
Answer: a) above`, o:["above","below","behind","inside"], a:0, e:"Above shows the balloons were higher than the table." },

  { q:`3. The librarian arranged the books carefully on the shelves. Storybooks were placed next to the science books. A globe stood near the reading corner, and students sat quietly on the chairs while reading.
Question:
Which preposition best completes the sentence?
The storybooks were placed ______ the science books.
a) behind
b) next to
c) under
d) across
Answer: b) next to`, o:["behind","next to","under","across"], a:1, e:"Next to shows the storybooks were beside the science books." },

  { q:`4. Every school day, Rohan wakes up at 6:30 a.m. He brushes his teeth, eats breakfast, and leaves for school at 7:30 a.m. His classes begin at 8:00 a.m., and he returns home in the afternoon.
Question:
Which preposition best completes the sentence?
Rohan wakes up ______ 6:30 a.m.
a) in
b) on
c) at
d) by
Answer: c) at`, o:["in","on","at","by"], a:2, e:"At is used for a specific time." },

  { q:`5. The children were excited about the Diwali celebration. They decorated their homes in the evening and lit lamps at night. The family planned to visit their grandparents on Sunday morning to celebrate together.
Question:
Which preposition best completes the sentence?
The family planned to visit their grandparents ______ Sunday morning.
a) in
b) at
c) on
d) by
Answer: c) on`, o:["in","at","on","by"], a:2, e:"On is used with days and day-time expressions like Sunday morning." },

  { q:`6. During the summer holidays, Neha visited her cousins. They played outdoor games in the morning, read books in the afternoon, and watched movies at night. Every day was full of fun and laughter.
Question:
Which preposition best completes the sentence?
They played games ______ the morning.
a) on
b) over
c) at
d) in
Answer: d) in`, o:["on","over","at","in"], a:3, e:"In is used for parts of the day like the morning." },

  { q:`7. The Grade 4 students visited the city zoo. As they entered through the main gate, they walked towards the bird enclosure first. Later, they moved across the bridge to see the elephants. Finally, they returned to the entrance before leaving.
Question:
Which preposition best completes the sentence?
The students walked ______ the bird enclosure first.
a) towards
b) under
c) between
d) inside
Answer: a) towards`, o:["towards","under","between","inside"], a:0, e:"Towards shows movement in the direction of the bird enclosure." },

  { q:`8. Before crossing the road, Anya looked to her right and then to her left. She walked across the zebra crossing with her father. After reaching the other side safely, they continued towards the park.
Question:
Which preposition best completes the sentence?
Anya walked ______ the zebra crossing.
a) over
b) across
c) behind
d) beside
Answer: b) across`, o:["over","across","behind","beside"], a:1, e:"Across means from one side to the other side." },

  { q:`9. The teacher organised a treasure hunt in the playground. The first clue asked the students to walk towards the old tree. The second clue was hidden behind a large rock. Finally, they found the treasure inside a small wooden box.
Question:
Which preposition best completes the sentence?
The second clue was hidden ______ a large rock.
a) beside
b) behind
c) above
d) across
Answer: b) behind`, o:["beside","behind","above","across"], a:1, e:"Behind shows the clue was at the back of the rock." },

  { q:`10. The children visited a large aquarium. Colourful fish swam inside the glass tanks. A starfish rested at the bottom of one tank, while tiny turtles floated near the surface. Everyone enjoyed watching the sea animals.
Question:
Which preposition best completes the sentence?
The fish swam ______ the glass tanks.
a) inside
b) behind
c) over
d) across
Answer: a) inside`, o:["inside","behind","over","across"], a:0, e:"Inside shows the fish were within the tanks." },

  { q:`11. The school football team practised every evening. The coach asked the players to arrive before 5:00 p.m. so that practice could begin on time. They trained until sunset and then went home.
Question:
Which preposition best completes the sentence?
The players had to arrive ______ 5:00 p.m.
a) in
b) under
c) on
d) before
Answer: d) before`, o:["in","under","on","before"], a:3, e:"Before shows they must arrive earlier than 5:00 p.m." },

  { q:`12. The students entered the museum through the front gate. They walked into the dinosaur gallery first and then moved towards the space exhibition. After exploring all the rooms, they came out through the exit door.
Question:
Which preposition best completes the sentence?
The students walked ______ the dinosaur gallery first.
a) into
b) over
c) beside
d) behind
Answer: a) into`, o:["into","over","beside","behind"], a:0, e:"Into shows movement from outside to inside the gallery." },

  { q:`13. During recess, the children played happily in the playground. Some students sat under a big tree to eat their snacks. Others played football between two goalposts. Their teacher watched them from a bench near the playground.
Question:
Which preposition best completes the sentence?
Some students sat ______ a big tree to eat their snacks.
a) between
b) under
c) above
d) across
Answer: b) under`, o:["between","under","above","across"], a:1, e:"Under shows the students were beneath the tree." }
];

//////////////////////////////////////////////////////
// AUDIO FIX WORKING
//////////////////////////////////////////////////////

function playAudio(src){
  if(!audioUnlocked) return;
  const audio = new Audio(src);
  audio.volume = 1;
  audio.play().catch(()=>{});
}

let currentIndex=0, score=0;

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
