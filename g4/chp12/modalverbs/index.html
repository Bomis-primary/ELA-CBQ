<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest for the Magic Key - Modal Verbs</title>
    <style>
        :root {
            --primary: #7c3aed;       /* Enchanted Royal Purple */
            --primary-light: #a78bfa; /* Soft Lavender */
            --secondary: #0ea5e9;     /* Sky Blue Accent */
            --background: #f5f3ff;    /* Very Light Lavender/Cloud Background */
            --surface: #ffffff;       /* Pure White Card */
            --text: #2e1065;          /* Deep Velvet Purple Text */
            --text-light: #6d28d9;    /* Mid-tone Magic Violet */
            --success: #10b981;       /* Mint Green Success */
            --error: #ef4444;         /* Spark Red Error */
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Ethereal Magic Background Elements */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .magic-orb {
            position: absolute;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.15), rgba(14, 165, 233, 0.15));
            border-radius: 50%;
            filter: blur(20px);
            animation: floatGlow 18s infinite ease-in-out;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-30px) scale(1.1); opacity: 0.8; }
        }

        /* Container & Cloud Castle Card UI */
        .game-container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            z-index: 10;
        }

        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 15px 40px rgba(124, 58, 237, 0.08);
            border: 2px solid rgba(167, 139, 250, 0.2);
            position: relative;
        }

        /* Screen States */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Splash Screen */
        #splash-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .logo-container img {
            max-width: 210px;
            height: auto;
        }

        /* Magic Trial Tracker Header */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f3e8ff;
            padding-bottom: 15px;
        }

        .tracker-item {
            background: #f5f3ff;
            border: 1px solid rgba(167, 139, 250, 0.3);
            padding: 8px 16px;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-light);
            border-radius: 50px;
        }

        .tracker-item span {
            color: var(--primary);
        }

        /* Magical Aura Timer Progress Bar */
        .timer-container {
            width: 100%;
            height: 8px;
            background: #e9d5ff;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            transition: width 1s linear;
        }

        /* Enchanted Story Context Passages */
        .passage-box {
            background: #fbfbfe;
            border-left: 4px solid var(--secondary);
            padding: 18px 22px;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #4c1d95;
            border-radius: 4px 16px 16px 4px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.01);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text);
        }

        /* Option Interaction Selection Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #ffffff;
            border: 2px solid #e9d5ff;
            padding: 15px 22px;
            border-radius: 14px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            color: var(--text);
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            background: #f5f3ff;
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .option-btn:disabled { cursor: not-allowed; }

        /* Magic Chamber Trial Result Overlays */
        .option-btn.correct {
            background-color: #d1fae5 !important;
            border-color: var(--success) !important;
            color: #065f46 !important;
        }

        .option-btn.wrong {
            background-color: #ffe4e6 !important;
            border-color: var(--error) !important;
            color: #9f1239 !important;
        }

        .option-btn.wrong::after {
            content: "✕";
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--error);
            font-weight: bold;
        }

        /* Magical Feedback Cards */
        .feedback-box {
            display: none;
            padding: 16px;
            border-radius: 12px;
            margin-top: 15px;
            font-weight: 500;
            line-height: 1.5;
        }

        .feedback-box.retry {
            display: block;
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: #92400e;
        }

        .feedback-box.explanation {
            display: block;
            background: #ecfdf4;
            border: 1px solid #a7f3d0;
            color: #065f46;
        }

        /* Castle Progress Control Button */
        .action-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
            transition: all 0.2s ease;
            text-align: center;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3);
        }

        /* Ethereal Confetti Sparkles */
        .confetti-star {
            position: absolute;
            color: var(--secondary);
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
            animation: cloudSparkle 0.6s ease-out forwards;
        }

        @keyframes cloudSparkle {
            0% { transform: translate(0, 0) scale(1.4); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @media (max-width: 480px) {
            .card { padding: 20px; }
            .game-header { font-size: 0.85rem; }
            .passage-box { font-size: 0.95rem; }
            .question-text { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg" id="ambient-layer"></div>

    <div class="game-container">
        <div id="splash-screen" class="card screen active">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Innovine Logo">
            </div>
            <h2 style="margin-top:25px; font-size:1.7rem; color: var(--primary);">Quest for the Magic Key</h2>
            <p style="color:var(--text-light); margin: 12px 0 30px 0; font-size: 0.95rem;">Unlocking the Castle of Modal Verbs</p>
            <button class="action-btn" id="start-btn" style="display:none;" onclick="startChallenge()">Begin Trial</button>
            <p id="loading-msg" style="color: var(--text-light); font-style: italic; font-size: 0.9rem;">Revealing magical path corridors...</p>
        </div>

        <div id="quiz-screen" class="card screen">
            <div class="game-header">
                <div class="tracker-item">Trial: <span id="q-current">1</span>/<span id="q-total">10</span></div>
                <div class="tracker-item">Aura Level: <span id="score-val">00</span></div>
            </div>

            <div class="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>

            <div class="passage-box" id="passage-text">Loading story scrolls...</div>
            <div class="question-text" id="question-text">Loading riddle puzzle...</div>

            <div class="options-grid" id="options-box"></div>

            <div class="feedback-box" id="feedback-message"></div>
            
            <button class="action-btn" id="next-btn" style="display:none; margin-top: 15px;" onclick="handleNextStep()">Advance Room &gt;</button>
        </div>

        <div id="result-screen" class="card screen" style="text-align: center;">
            <h2 style="font-size: 1.8rem; color: var(--primary); margin-bottom: 10px;">Enchanted Gates Opened</h2>
            <p style="color: var(--text-light); margin-bottom: 30px; font-size: 0.95rem;">Your linguistic wisdom scores:</p>
            
            <div style="margin: 25px 0;">
                <span id="final-score" style="font-size: 4.5rem; font-weight: 800; color: var(--text);">0</span>
                <span style="font-size: 2rem; color: var(--text-light);">/10</span>
            </div>

            <div id="performance-commentary" style="font-size: 1.05rem; margin-bottom: 30px; line-height: 1.6; background: #faf5ff; border: 1px dashed var(--primary-light); padding: 18px; border-radius: 12px; color: var(--text);"></div>

            <button class="action-btn" onclick="restartGame()">Re-enter Castle</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                passage: "Riya was sitting in her classroom working on her art project. She realized that she had forgotten her pencil at home. She looked around and saw her friend Jayanti sitting next to her with a pencil case. Feeling nervous, she politely asked, “_____ I borrow your pencil for a few minutes? I will return it as soon as I finish my drawing.”",
                question: "Question: What does the modal verb express in this sentence?",
                options: ["Ability", "Permission", "Obligation", "Advice"],
                answer: "Permission",
                explanation: "Explanation: The modal verb “may/can” here is used to ask politely for permission."
            },
            {
                passage: "During music class, the teacher wanted each student to sing a song from memory. Arjun had been practicing every day for the past week. The teacher smiled and said, “You _____ perform this song perfectly because you have been practicing regularly.”",
                question: "Question: What type of modal verb is used here?",
                options: ["Obligation", "Ability", "Permission", "Possibility"],
                answer: "Ability",
                explanation: "Explanation: The modal verb “can” expresses Arjun’s ability to sing the song."
            },
            {
                passage: "After a routine health check-up, the school nurse gathered the students and gave them tips to stay healthy. She said, “You _____ drink plenty of water every day and eat fresh fruits regularly to stay strong and fit.”",
                question: "Question: What feeling does the modal verb show?",
                options: ["Advice", "Obligation", "Permission", "Ability"],
                answer: "Advice",
                explanation: "Explanation: The modal verb “should” is used to give advice to the students."
            },
            {
                passage: "The family had to catch a train that departed at 2:00 p.m. The mother reminded her children, “You _____ reach the station by 1:30 p.m. so that we do not miss the train. It is very important to be on time.”",
                question: "Question: What type of modal verb is used here?",
                options: ["Possibility", "Advice", "Permission", "Obligation"],
                answer: "Obligation",
                explanation: "Explanation: The modal verb “must” shows that reaching on time is necessary; it expresses obligation."
            },
            {
                passage: "During computer lab time, Jayanti needed to work on a project. She saw her friend Rohit already using the only available laptop. She politely asked, “_____ I use your laptop for my project work for the next 10 minutes?”",
                question: "Question: Which type of modal verb is correct here?",
                options: ["Ability", "Permission", "Advice", "Obligation"],
                answer: "Permission",
                explanation: "Explanation: “May/Can” is used to ask politely for permission."
            },
            {
                passage: "The sky was cloudy, and dark clouds had gathered above the school. The teacher told the students, “It _____ rain this afternoon, so you should take umbrellas and wear your raincoats to school.”",
                question: "Question: What does the modal verb indicate?",
                options: ["Advice", "Obligation", "Possibility", "Permission"],
                answer: "Possibility",
                explanation: "Explanation: The modal verb “might” or “could” expresses the possibility of rain."
            },
            {
                passage: "Last year, during the school talent show, Meera danced beautifully and amazed everyone. Her teacher said, “She _____ perform such a complicated dance even at that young age. I was really impressed.”",
                question: "Question: What type of modal verb is this?",
                options: ["Past Ability", "Advice", "Permission", "Obligation"],
                answer: "Past Ability",
                explanation: "Explanation: “Could” expresses that Meera had the ability in the past."
            },
            {
                passage: "Rohan wanted to read a book that his friend was currently using. He asked politely, “_____ I borrow the book after you finish reading it? I really need it for my homework.”",
                question: "Question: What does the modal verb show?",
                options: ["Permission", "Obligation", "Advice", "Ability"],
                answer: "Permission",
                explanation: "Explanation: The modal verb “may/can” asks for permission politely."
            },
            {
                passage: "During a school field trip, the teacher reminded the students, “You _____ wear helmets while riding your bicycles for your own safety. No one should take risks.”",
                question: "Question: What type of modal verb is used here?",
                options: ["Advice", "Obligation", "Ability", "Permission"],
                answer: "Obligation",
                explanation: "Explanation: “Must” is used to indicate that wearing a helmet is necessary; it shows obligation."
            },
            {
                passage: "The principal stood in front of the school assembly and announced, “We _____ organize a science exhibition next month if all classes submit their projects on time. We will confirm once we see the readiness.”",
                question: "Question: Which type of modal verb is used here?",
                options: ["Obligation", "Advice", "Permission", "Possibility"],
                answer: "Possibility",
                explanation: "Explanation: The modal verb “might” or “could” shows that the exhibition may happen; it expresses possibility."
            }
        ];

        // Architectural System Constraints
        const TIME_LIMIT = 45; // Grade 4 rule
        let currentIdx = 0;
        let score = 0;
        let timerInterval = null;
        let remainingTime = TIME_LIMIT;
        let errorCountForCurrentQuestion = 0;

        // Custom Declared Media Objects
        const soundCorrect = new Audio('assets/correct.mp3');
        const soundWrong = new Audio('assets/wrong.mp3');
        const soundClaps = new Audio('assets/freesound_community-claps-44774.mp3');

        window.addEventListener('DOMContentLoaded', () => {
            generateEtherealOrbs();
            
            // Mandatory 5 second brand delay configuration
            setTimeout(() => {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
            }, 5000);
        });

        function generateEtherealOrbs() {
            const layer = document.getElementById('ambient-layer');
            for(let i = 0; i < 3; i++) {
                const orb = document.createElement('div');
                orb.className = 'magic-orb';
                const size = Math.random() * 150 + 150;
                orb.style.width = `${size}px`;
                orb.style.height = `${size}px`;
                orb.style.left = `${Math.random() * 80}vw`;
                orb.style.top = `${Math.random() * 80}vh`;
                orb.style.animationDelay = `${i * 3}s`;
                layer.appendChild(orb);
            }
        }

        function startChallenge() {
            document.getElementById('splash-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            document.getElementById('q-total').textContent = quizData.length;
            loadQuestion();
        }

        function loadQuestion() {
            errorCountForCurrentQuestion = 0;
            const item = quizData[currentIdx];
            
            document.getElementById('q-current').textContent = currentIdx + 1;
            document.getElementById('passage-text').textContent = item.passage;
            document.getElementById('question-text').textContent = item.question;
            document.getElementById('next-btn').style.display = 'none';
            
            const msgBox = document.getElementById('feedback-message');
            msgBox.style.display = 'none';

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            item.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => challengeInputVerification(btn, opt);
                box.appendChild(btn);
            });

            remainingTime = TIME_LIMIT;
            refreshEtherealTimer();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                remainingTime--;
                refreshEtherealTimer();
                if(remainingTime <= 0) {
                    clearInterval(timerInterval);
                    handleTrialTimeout();
                }
            }, 1000);
        }

        function refreshEtherealTimer() {
            const bar = document.getElementById('timer-bar');
            const pct = (remainingTime / TIME_LIMIT) * 100;
            bar.style.width = `${pct}%`;
            
            if (pct < 30) {
                bar.style.background = 'var(--error)';
            } else if (pct < 60) {
                bar.style.background = 'var(--warning)';
            } else {
                bar.style.background = 'linear-gradient(90deg, var(--secondary), var(--primary))';
            }
        }

        function triggerCloudSparks(targetBtn) {
            const rect = targetBtn.getBoundingClientRect();
            for(let i=0; i<15; i++) {
                const spark = document.createElement('div');
                spark.className = 'confetti-star';
                spark.innerHTML = '★';
                spark.style.left = `${rect.left + rect.width/2}px`;
                spark.style.top = `${rect.top + rect.height/2}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 90 + 40;
                spark.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
                spark.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
                
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 600);
            }
        }

        function challengeInputVerification(selectedBtn, chosenText) {
            const currentItem = quizData[currentIdx];
            const msgBox = document.getElementById('feedback-message');
            
            if (chosenText === currentItem.answer) {
                clearInterval(timerInterval);
                selectedBtn.classList.add('correct');
                score++;
                document.getElementById('score-val').textContent = score < 10 ? '0' + score : score;
                triggerCloudSparks(selectedBtn);
                
                try { soundCorrect.play(); } catch(e){}
                disableInteractiveMatrix();
                
                msgBox.textContent = "✨ Trial Unlocked! You successfully determined the correct application of the modal verb.";
                msgBox.className = "feedback-box explanation";
                document.getElementById('next-btn').style.display = 'block';
            } else {
                errorCountForCurrentQuestion++;
                selectedBtn.classList.add('wrong');
                selectedBtn.disabled = true;
                
                try { soundWrong.play(); } catch(e){}

                if(errorCountForCurrentQuestion === 1) {
                    msgBox.textContent = "❌ The key resists! That interpretation is incorrect. Re-analyze and attempt once more.";
                    msgBox.className = "feedback-box retry";
                } else {
                    clearInterval(timerInterval);
                    disableInteractiveMatrix();
                    revealCorrectKey(currentItem.answer);
                    
                    msgBox.innerHTML = `<strong>${currentItem.explanation}</strong>`;
                    msgBox.className = "feedback-box explanation";
                    document.getElementById('next-btn').style.display = 'block';
                }
            }
        }

        function handleTrialTimeout() {
            disableInteractiveMatrix();
            const currentItem = quizData[currentIdx];
            revealCorrectKey(currentItem.answer);
            
            const msgBox = document.getElementById('feedback-message');
            msgBox.innerHTML = `<strong>⌛ Time has slipped away!</strong> ${currentItem.explanation}`;
            msgBox.className = "feedback-box explanation";
            document.getElementById('next-btn').style.display = 'block';
            try { soundWrong.play(); } catch(e){}
        }

        function revealCorrectKey(correctValue) {
            const segments = document.querySelectorAll('.option-btn');
            segments.forEach(btn => {
                if(btn.textContent === correctValue) {
                    btn.classList.add('correct');
                }
            });
        }

        function disableInteractiveMatrix() {
            const segments = document.querySelectorAll('.option-btn');
            segments.forEach(btn => btn.disabled = true);
        }

        function handleNextStep() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                loadQuestion();
            } else {
                displayFinalCastleMetrics();
            }
        }

        function displayFinalCastleMetrics() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            
            document.getElementById('final-score').textContent = score;
            const commentary = document.getElementById('performance-commentary');
            
            if(score === quizData.length) {
                commentary.textContent = "🏆 CASTLE RANK: GRAND WIZARD OF GRAMMAR! You hold absolute mastery over modal verbs and unlocked every magical portal flawlessly.";
                try { soundClaps.play(); } catch(e){}
            } else if(score >= 8) {
                commentary.textContent = "🌟 CASTLE RANK: ELITE KEYMASTER! Your capability with modal verbs is superb. You easily completed the castle trials.";
                try { soundClaps.play(); } catch(e){}
            } else if(score >= 5) {
                commentary.textContent = "🏰 CASTLE RANK: ADVANCED DISCIPLE! You made it through the gate, but practicing the fine lines between obligation and advice will make your aura stronger.";
            } else {
                commentary.textContent = "📚 CASTLE RANK: ACADEMY INITIATE! The gate has closed. Refresh your training notes on ability, permission, and rules, and try the trials again.";
            }
        }

        function restartGame() {
            currentIdx = 0;
            score = 0;
            document.getElementById('score-val').textContent = "00";
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            loadQuestion();
        }
    </script>
</body>
</html>
