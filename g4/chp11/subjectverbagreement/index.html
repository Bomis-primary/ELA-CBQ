<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Perfect Bridge - Subject-Verb Agreement</title>
    <style>
        :root {
            --primary: #1e3a8a;       /* Blueprint Deep Blue */
            --primary-light: #2563eb; /* Active Drafting Blue */
            --secondary: #f59e0b;     /* Safety Amber / Construction Gold */
            --background: #0f172a;    /* Dark Studio Slate */
            --surface: #1e293b;       /* Workstation Panel Blue */
            --text: #f8fafc;          /* Off-White Text */
            --text-light: #94a3b8;    /* Blueprint Grid Gray */
            --success: #10b981;       /* Alignment Success Green */
            --error: #ef4444;         /* Structural Stress Red */
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Blueprint Grid Layout Elements */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(148, 163, 184, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
        }

        .grid-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.08), transparent);
            height: 2px;
            width: 100%;
            animation: scanLine 12s infinite linear;
        }

        @keyframes scanLine {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        /* Container & Structural Panel UI */
        .game-container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            z-index: 10;
        }

        .card {
            background: var(--surface);
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        /* Screen Configurations */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Splash Screen */
        #splash-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .logo-container img {
            max-width: 210px;
            height: auto;
            border-bottom: 2px dashed var(--primary-light);
            padding-bottom: 15px;
        }

        /* Technical Metric Headers */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 15px;
        }

        .tracker-item {
            background: rgba(30, 58, 138, 0.5);
            border: 1px dashed var(--primary-light);
            padding: 6px 14px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-light);
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tracker-item span {
            color: var(--secondary);
        }

        /* Construction Timer Bar */
        .timer-container {
            width: 100%;
            height: 8px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--secondary));
            transition: width 1s linear;
        }

        /* Blueprint Context / Case Boxes */
        .passage-box {
            background: rgba(15, 23, 42, 0.6);
            border-left: 4px solid var(--secondary);
            padding: 16px 20px;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #cbd5e1;
            border-radius: 0 8px 8px 0;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }

        /* Option Button Grid Interface */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--primary-light);
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            color: var(--text);
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--primary-light);
            border-color: var(--secondary);
            transform: translateX(4px);
        }

        .option-btn:disabled { cursor: not-allowed; }

        /* Structural Calibration Visual Indicators */
        .option-btn.correct {
            background-color: rgba(16, 185, 129, 0.2) !important;
            border-color: var(--success) !important;
            color: #a7f3d0 !important;
        }

        .option-btn.wrong {
            background-color: rgba(239, 68, 68, 0.2) !important;
            border-color: var(--error) !important;
            color: #fca5a5 !important;
        }

        .option-btn.wrong::after {
            content: "✕";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--error);
            font-weight: bold;
        }

        /* Feedback Data Panels */
        .feedback-box {
            display: none;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 500;
            line-height: 1.5;
        }

        .feedback-box.retry {
            display: block;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--secondary);
            color: #fde047;
        }

        .feedback-box.explanation {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: #a7f3d0;
        }

        /* Structural Execution Control Button */
        .action-btn {
            display: block;
            width: 100%;
            background: var(--secondary);
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
            transition: all 0.2s ease;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        /* Amber Confetti Stars Grid */
        .confetti-star {
            position: absolute;
            color: var(--secondary);
            font-size: 22px;
            pointer-events: none;
            z-index: 100;
            animation: blueprintSpark 0.5s ease-out forwards;
        }

        @keyframes blueprintSpark {
            0% { transform: translate(0, 0) scale(1.3); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @media (max-width: 480px) {
            .card { padding: 20px; }
            .game-header { font-size: 0.8rem; }
            .passage-box { font-size: 0.95rem; }
            .question-text { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg" id="ambient-layer"></div>

    <div class="game-container">
        <div id="splash-screen" class="card screen active">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Innovine Logo">
            </div>
            <h2 style="margin-top:25px; font-size:1.6rem; text-transform: uppercase; color: var(--secondary);">The Perfect Bridge</h2>
            <p style="color:var(--text-light); margin: 12px 0 30px 0; font-size: 0.95rem;">Subject-Verb Structural Alignment Lab</p>
            <button class="action-btn" id="start-btn" style="display:none;" onclick="startChallenge()">Initialize Assembly</button>
            <p id="loading-msg" style="color: var(--text-light); font-style: italic; font-size: 0.9rem;">Calibrating blueprint vectors...</p>
        </div>

        <div id="quiz-screen" class="card screen">
            <div class="game-header">
                <div class="tracker-item">Section: <span id="q-current">1</span>/<span id="q-total">10</span></div>
                <div class="tracker-item">Balance Score: <span id="score-val">00</span></div>
            </div>

            <div class="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>

            <div class="passage-box" id="passage-text">Loading context array...</div>
            <div class="question-text" id="question-text">Loading target problem...</div>

            <div class="options-grid" id="options-box"></div>

            <div class="feedback-box" id="feedback-message"></div>
            
            <button class="action-btn" id="next-btn" style="display:none; margin-top: 15px;" onclick="handleNextStep()">Engage Next Vector &gt;</button>
        </div>

        <div id="result-screen" class="card screen" style="text-align: center;">
            <h2 style="font-size: 1.8rem; color: var(--secondary); margin-bottom: 10px; text-transform: uppercase;">Structural Audit Complete</h2>
            <p style="color: var(--text-light); margin-bottom: 30px; font-size: 0.9rem;">Bridge integrity parameters processed:</p>
            
            <div style="margin: 25px 0;">
                <span id="final-score" style="font-size: 4.5rem; font-weight: 800; color: var(--text);">0</span>
                <span style="font-size: 2rem; color: var(--text-light);">/10</span>
            </div>

            <div id="performance-commentary" style="font-size: 1.05rem; margin-bottom: 30px; line-height: 1.5; border: 1px dashed var(--primary-light); background: rgba(30, 58, 138, 0.3); padding: 15px; border-radius: 6px;"></div>

            <button class="action-btn" onclick="restartGame()">Re-Align Blueprint</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                passage: "Every morning, students gather in the school assembly ground before the bell rings. The teacher notices that the class ___ standing in perfect silence while the national anthem begins.",
                question: "What completes the sentence correctly?",
                options: ["are", "have", "were", "is"],
                answer: "is",
                explanation: "The noun 'class' is used here as a single collective unit acting together in unison, meaning it requires the singular verb 'is'."
            },
            {
                passage: "During the EVS period, Riya and her classmates go to the school garden to observe plants. They ___ watering the flowers and writing observations in their notebooks carefully.",
                question: "What is correct?",
                options: ["is", "was", "are", "has"],
                answer: "are",
                explanation: "The subject pronoun 'They' is plural and specifies multiple individuals, hence it perfectly matches the plural verb 'are'."
            },
            {
                passage: "In the school library, discipline is very important. The librarian explains that each student ___ a library card before borrowing any book from the shelf.",
                question: "What fits correctly?",
                options: ["has", "have", "are", "do"],
                answer: "has",
                explanation: "The distributive modifier 'each' makes the subject singular in nature, requiring the singular verb form 'has'."
            },
            {
                passage: "Rohan lives in a joint family where everyone sits together for breakfast every morning. His parents, grandparents, and siblings ___ breakfast at the same time before leaving for work and school.",
                question: "What is correct?",
                options: ["eats", "eating", "eat", "eaten"],
                answer: "eat",
                explanation: "The plural compound subject ('parents, grandparents, and siblings') joined by 'and' dictates the plural base verb form 'eat'."
            },
            {
                passage: "From the classroom window, the teacher observes the playground. She sees that the children ___ happily under the trees, enjoying their short break after class.",
                question: "What completes the sentence correctly?",
                options: ["is", "are", "was", "has"],
                answer: "are",
                explanation: "'Children' is an irregular plural noun, which structurally aligns exclusively with the plural verb form 'are'."
            },
            {
                passage: "The school has adopted a friendly dog that lives near the gate. It ___ loudly whenever strangers enter the campus but stays calm when it sees familiar faces.",
                question: "What is correct?",
                options: ["bark", "barked", "barks", "barking"],
                answer: "barks",
                explanation: "The singular third-person pronoun subject 'It' pairs natively with the singular verb ending in '-s', which is 'barks'."
            },
            {
                passage: "The teacher checks homework every morning. She notices that Riya ___ her homework neatly before coming to school without fail.",
                question: "What fits correctly?",
                options: ["do", "does", "doing", "done"],
                answer: "does",
                explanation: "Because 'Riya' is a singular proper noun, it demands the singular verb configuration 'does' in the present tense."
            },
            {
                passage: "As the annual sports day approaches, all students ___ regularly in the field after school hours to prepare for races and drills.",
                question: "What is correct?",
                options: ["is", "was", "are", "has"],
                answer: "are",
                explanation: "The complete subject expression 'all students' is plural, requiring the plural linking verb element 'are'."
            },
            {
                passage: "The teacher reminds the class that every student ___ responsible for keeping the classroom clean and organized throughout the day.",
                question: "What completes the sentence?",
                options: ["are", "have", "has", "is"],
                answer: "is",
                explanation: "Phrases modified by 'every' (like 'every student') are grammatically singular and align safely with 'is'."
            },
            {
                passage: "On school days, the school bus arrives on time and Rohan ___ the bus at exactly 7:10 a.m. near the main gate every morning.",
                question: "What is correct?",
                options: ["board", "boards", "boarding", "boarded"],
                answer: "boards",
                explanation: "'Rohan' is a single individual acting as a singular subject, which coordinates accurately with the singular verb form 'boards'."
            }
        ];

        // Core App Framework Variables
        const TIME_LIMIT = 45; // Grade 4 rule logic
        let currentIdx = 0;
        let score = 0;
        let timerInterval = null;
        let remainingTime = TIME_LIMIT;
        let errorCountForCurrentQuestion = 0;

        // Audio System Allocation
        const soundCorrect = new Audio('assets/correct.mp3');
        const soundWrong = new Audio('assets/wrong.mp3');
        const soundClaps = new Audio('assets/freesound_community-claps-44774.mp3');

        window.addEventListener('DOMContentLoaded', () => {
            generateBlueprintLines();
            
            // Fixed mandatory brand presentation period loop
            setTimeout(() => {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
            }, 5000);
        });

        function generateBlueprintLines() {
            const layer = document.getElementById('ambient-layer');
            for(let i = 0; i < 2; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line';
                line.style.animationDelay = `${i * 6}s`;
                layer.appendChild(line);
            }
        }

        function startChallenge() {
            document.getElementById('splash-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            document.getElementById('q-total').textContent = quizData.length;
            loadQuestion();
        }

        function loadQuestion() {
            errorCountForCurrentQuestion = 0;
            const item = quizData[currentIdx];
            
            document.getElementById('q-current').textContent = currentIdx + 1;
            document.getElementById('passage-text').textContent = item.passage;
            document.getElementById('question-text').textContent = item.question;
            document.getElementById('next-btn').style.display = 'none';
            
            const msgBox = document.getElementById('feedback-message');
            msgBox.style.display = 'none';

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            item.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => verifyMatrixSelection(btn, opt);
                box.appendChild(btn);
            });

            remainingTime = TIME_LIMIT;
            refreshTimerDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                remainingTime--;
                refreshTimerDisplay();
                if(remainingTime <= 0) {
                    clearInterval(timerInterval);
                    triggerSystemTimeout();
                }
            }, 1000);
        }

        function refreshTimerDisplay() {
            const bar = document.getElementById('timer-bar');
            const pct = (remainingTime / TIME_LIMIT) * 100;
            bar.style.width = `${pct}%`;
            
            if (pct < 30) {
                bar.style.background = 'var(--error)';
            } else if (pct < 60) {
                bar.style.background = 'rgba(245, 158, 11, 0.8)';
            } else {
                bar.style.background = 'linear-gradient(90deg, var(--primary-light), var(--secondary))';
            }
        }

        function flashBlueprintSparks(targetBtn) {
            const rect = targetBtn.getBoundingClientRect();
            for(let i=0; i<12; i++) {
                const spark = document.createElement('div');
                spark.className = 'confetti-star';
                spark.innerHTML = '★';
                spark.style.left = `${rect.left + rect.width/2}px`;
                spark.style.top = `${rect.top + rect.height/2}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 90 + 30;
                spark.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
                spark.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
                
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 500);
            }
        }

        function verifyMatrixSelection(selectedBtn, chosenText) {
            const currentItem = quizData[currentIdx];
            const msgBox = document.getElementById('feedback-message');
            
            if (chosenText === currentItem.answer) {
                clearInterval(timerInterval);
                selectedBtn.classList.add('correct');
                score++;
                document.getElementById('score-val').textContent = score < 10 ? '0' + score : score;
                flashBlueprintSparks(selectedBtn);
                
                try { soundCorrect.play(); } catch(e){}
                lockInputOptions();
                
                msgBox.textContent = "[ ALIGNMENT SECURED ] Excellent! Subject and verb vectors are structurally balanced.";
                msgBox.className = "feedback-box explanation";
                document.getElementById('next-btn').style.display = 'block';
            } else {
                errorCountForCurrentQuestion++;
                selectedBtn.classList.add('wrong');
                selectedBtn.disabled = true;
                
                try { soundWrong.play(); } catch(e){}

                if(errorCountForCurrentQuestion === 1) {
                    msgBox.textContent = "[ STRUCTURAL STRESS ] Mismatch detected. Recalibrate parameters and try again!";
                    msgBox.className = "feedback-box retry";
                } else {
                    clearInterval(timerInterval);
                    lockInputOptions();
                    exposeCorrectBlueprint(currentItem.answer);
                    
                    msgBox.innerHTML = `<strong>[ CORRECTION LOG ] Structural balance failed.</strong> ${currentItem.explanation}`;
                    msgBox.className = "feedback-box explanation";
                    document.getElementById('next-btn').style.display = 'block';
                }
            }
        }

        function triggerSystemTimeout() {
            lockInputOptions();
            const currentItem = quizData[currentIdx];
            exposeCorrectBlueprint(currentItem.answer);
            
            const msgBox = document.getElementById('feedback-message');
            msgBox.innerHTML = `<strong>[ ANALYSIS TIMEOUT ]</strong> ${currentItem.explanation}`;
            msgBox.className = "feedback-box explanation";
            document.getElementById('next-btn').style.display = 'block';
            try { soundWrong.play(); } catch(e){}
        }

        function exposeCorrectBlueprint(correctValue) {
            const elements = document.querySelectorAll('.option-btn');
            elements.forEach(btn => {
                if(btn.textContent === correctValue) {
                    btn.classList.add('correct');
                }
            });
        }

        function lockInputOptions() {
            const elements = document.querySelectorAll('.option-btn');
            elements.forEach(btn => btn.disabled = true);
        }

        function handleNextStep() {
            currentIdx++;
            if(currentIdx < quizData.length) {
                loadQuestion();
            } else {
                evaluateTotalIntegrity();
            }
        }

        function evaluateTotalIntegrity() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            
            document.getElementById('final-score').textContent = score;
            const commentary = document.getElementById('performance-commentary');
            
            if(score === quizData.length) {
                commentary.textContent = "INTEGRITY RANK: MASTER ARCHITECT! Your bridge blueprint is flawlessly balanced with perfect subject-verb coordination.";
                try { soundClaps.play(); } catch(e){}
            } else if(score >= 8) {
                commentary.textContent = "INTEGRITY RANK: CHIEF ENGINEER! Highly robust structural balance. Only minor tuning variations noted.";
                try { soundClaps.play(); } catch(e){}
            } else if(score >= 5) {
                commentary.textContent = "INTEGRITY RANK: FIELD SURVEYOR! The foundation stands, but review singular and plural collective metrics to minimize structural stress.";
            } else {
                commentary.textContent = "INTEGRITY RANK: APPRENTICE REBOOT! High alignment risk. Re-examine grammar structural guidelines and initialize a completely fresh run.";
            }
        }

        function restartGame() {
            currentIdx = 0;
            score = 0;
            document.getElementById('score-val').textContent = "00";
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            loadQuestion();
        }
    </script>
</body>
</html>
