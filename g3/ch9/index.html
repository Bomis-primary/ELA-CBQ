<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 3 English - Comparison of Adjectives Interactive</title>
    <style>
        :root {
            --primary: #4A6FA5;
            --primary-dark: #3B5984;
            --secondary: #47B39D;
            --accent: #FF7B54;
            --bg-light: #F6F8FA;
            --text-main: #2D3748;
            --text-muted: #718096;
            --white: #FFFFFF;
            --correct-bg: #E6F4EA;
            --correct-text: #137333;
            --wrong-bg: #FCE8E6;
            --wrong-text: #C5221F;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Splash Screen Layout */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .logo-placeholder {
            width: 220px;
            height: auto;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .loader-bar {
            width: 150px;
            height: 6px;
            background-color: #E2E8F0;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            width: 100%;
            height: 100%;
            background-color: var(--primary);
            position: absolute;
            left: -100%;
            animation: load 5s linear forwards;
        }

        @keyframes load {
            to { left: 0; }
        }

        /* App Container Layout */
        .app-container {
            width: 100%;
            max-width: 720px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 24px;
            margin: 16px;
            display: none;
            position: relative;
        }

        /* Header UI Component */
        .interactive-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #EDF2F7;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .chapter-title {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 700;
        }

        .tracker-badge {
            background-color: #EBF8FF;
            color: #2B6CB0;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* Progress System Component */
        .status-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .progress-track {
            flex-grow: 1;
            height: 8px;
            background-color: #E2E8F0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
        }

        .timer-box {
            font-variant-numeric: tabular-nums;
            font-weight: bold;
            background-color: #FFF5F5;
            color: #C53030;
            padding: 4px 10px;
            border-radius: 6px;
            min-width: 45px;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid #FED7D7;
        }

        /* Passage Context Block Component */
        .card-context {
            background-color: #F7FAFC;
            border-left: 4px solid var(--primary);
            padding: 14px;
            border-radius: 4px 8px 8px 4px;
            margin-bottom: 20px;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* Options Stack Component */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-btn {
            background-color: var(--white);
            border: 2px solid #E2E8F0;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            font-weight: 500;
            outline: none;
            width: 100%;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #F8FAFC;
            transform: translateY(-1px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.selected-correct {
            background-color: var(--correct-bg) !important;
            border-color: var(--secondary) !important;
            color: var(--correct-text) !important;
            font-weight: 600;
        }

        .option-btn.selected-wrong {
            background-color: var(--wrong-bg) !important;
            border-color: var(--accent) !important;
            color: var(--wrong-text) !important;
        }

        /* Feedback Banner Component */
        .feedback-banner {
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-footer {
            display: flex;
            justify-content: flex-end;
        }

        .action-btn {
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .action-btn:hover {
            background-color: var(--primary-dark);
        }

        .action-btn:disabled {
            background-color: #CBD5E0;
            cursor: not-allowed;
        }

        /* Evaluation View Component */
        .results-container {
            text-align: center;
            display: none;
            padding: 20px 10px;
        }

        .results-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            margin: 15px 0;
        }

        .results-msg {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

    <!-- Splash Screen Panel -->
    <div id="splash-screen">
        <img class="logo-placeholder" src="g3/ch9/assets/logo.png" alt="Innovine Logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'60\' viewBox=\'0 0 200 60\'><rect width=\'100%\' height=\'100%\' fill=\'%234A6FA5\' rx=\'8\'/><text x=\'50%\' y=\'55%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'white\' font-family=\'sans-serif\' font-size=\'20\' font-weight=\'bold\'>INNOVINE</text></svg>'">
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <!-- Main Challenge Dashboard Container -->
    <div class="app-container" id="challenge-board">
        <div class="interactive-header">
            <span class="chapter-title">Chapter 9: Comparison of Adjectives</span>
            <span class="tracker-badge" id="score-display">Score: 0</span>
        </div>

        <!-- Question View Box -->
        <div id="question-view">
            <div class="status-container">
                <div class="progress-track">
                    <div class="progress-fill" id="progress-indicator"></div>
                </div>
                <div class="timer-box" id="timer-display">60</div>
            </div>

            <div class="card-context" id="context-box"></div>

            <div class="question-text" id="question-box"></div>

            <div class="options-grid" id="options-container"></div>
            
            <div class="feedback-banner" id="feedback-box"></div>

            <div class="action-footer">
                <button class="action-btn" id="next-submit-btn" disabled>Submit Answer</button>
            </div>
        </div>

        <!-- Results Evaluation View Box -->
        <div class="results-container" id="results-view">
            <h2>Challenge Evaluation Complete!</h2>
            <div class="results-score" id="final-score-text">0/14</div>
            <div class="results-msg" id="final-message-text"></div>
            <button class="action-btn" onclick="location.reload();">Retry Challenge</button>
        </div>
    </div>

    <!-- Audio Feedback Mapping -->
    <audio id="audio-correct" src="g3/ch9/assets/claps.mp3" preload="auto"></audio>
    <audio id="audio-wrong" src="g3/ch9/assets/wrong.mp3" preload="auto"></audio>

    <script>
        // Exactly 14 high-quality structural & text competency items
        const questionsDataset = [
            {
                type: "Passage-Based MCQ",
                context: "Seema is a tall girl. Her brother is taller than her. Their father is the tallest person in the family.",
                question: "Which word represents the simple positive form of the adjective when no direct comparison is being made?",
                options: ["tall", "taller", "tallest", "tallish"],
                answerIndex: 0,
                hint: "The positive form is the basic describing word used for a single person."
            },
            {
                type: "Passage-Based MCQ",
                context: "Seema is a tall girl. Her brother is taller than her. Their father is the tallest person in the family.",
                question: "Which word is the comparative form used to match Seema directly against her brother?",
                options: ["taller", "tall", "tallest", "more tall"],
                answerIndex: 0,
                hint: "Comparative forms comparing two entities usually end with the suffix '-er'."
            },
            {
                type: "Passage-Based MCQ",
                context: "Seema is a tall girl. Her brother is taller than her. Their father is the tallest person in the family.",
                question: "Which word is the superlative form that proves the father ranks at the absolute top of the entire family structure?",
                options: ["tallest", "tall", "taller", "most taller"],
                answerIndex: 0,
                hint: "Superlative forms comparing three or more things end with '-est'."
            },
            {
                type: "Form Selection MCQ",
                context: "You are identifying scale shifts for small objects.",
                question: "What is the grammatically correct comparative form of 'small'?",
                options: ["smaller", "smallest", "more small", "most small"],
                answerIndex: 0,
                hint: "Add '-er' directly to short, one-syllable adjectives to make them comparative."
            },
            {
                type: "Form Selection MCQ",
                context: "You are describing a person who has the highest level of kindness in a room.",
                question: "What is the correct superlative form of the word 'kind'?",
                options: ["kindest", "kinder", "more kind", "most kind"],
                answerIndex: 0,
                hint: "We add the suffix '-est' to short base words to showcase the top superlative level."
            },
            {
                type: "Form Selection MCQ",
                context: "Some adjectives undergo spelling modifications when their base letters change.",
                question: "What is the correct comparative form of the word 'happy'?",
                options: ["happier", "happiest", "more happy", "most happy"],
                answerIndex: 0,
                hint: "Swap the ending '-y' with an 'i' before adding your regular comparative suffix."
            },
            {
                type: "Form Selection MCQ",
                context: "Certain irregular adjectives shift completely between positive, comparative, and superlative states.",
                question: "What is the correct superlative form of the word 'good'?",
                options: ["best", "better", "goodest", "more good"],
                answerIndex: 0,
                hint: "The word 'good' turns into 'better' when comparing two things, and becomes this word for three or more."
            },
            {
                type: "Sentence Completion MCQ",
                context: "Scenario: 'My bag weighs more than yours because it contains heavy textbooks.'",
                question: "Choose the correct spelling variant to complete the statement: 'My bag is ______ than yours.'",
                options: ["heavier", "heaviest", "heavyest", "more heavy"],
                answerIndex: 0,
                hint: "Change the '-y' in heavy to an 'i' and add '-er' to compare two items."
            },
            {
                type: "Sentence Completion MCQ",
                context: "Scenario: Exploring a whole bakery showcase to find the absolute highest level of sugar flavor.",
                question: "Complete the sentence logically: 'This is the ______ cake in the shop.'",
                options: ["sweetest", "sweeter", "more sweet", "sweet"],
                answerIndex: 0,
                hint: "The word 'the' positioned right before a blank demands a superlative '-est' form."
            },
            {
                type: "Sentence Completion MCQ",
                context: "Scenario: Analyzing the strength metrics of two different animal groups.",
                question: "Complete the sentence structurally: 'A lion is ______ than a cat.'",
                options: ["stronger", "strongest", "more strong", "strong"],
                answerIndex: 0,
                hint: "The word 'than' means we are comparing exactly two animals, which requires an '-er' suffix."
            },
            {
                type: "Real-Life Application MCQ",
                context: "Imagine sitting down to test and compare exactly two alternative action toys side-by-side.",
                question: "Which type of describing word should you use when comparing exactly two items?",
                options: ["taller", "tallest", "tall", "most tall"],
                answerIndex: 0,
                hint: "Use a comparative form ending in '-er' when exactly two items are balanced against each other."
            },
            {
                type: "Competency Text MCQ",
                context: "Scenario: Rohan has a yellow pencil that is 10cm long. Amit has a blue pencil that is 14cm long.",
                question: "Which sentence accurately compares Amit's pencil to Rohan's pencil?",
                options: ["Amit's pencil is longer than Rohan's.", "Amit's pencil is long than Rohan's.", "Amit's pencil is longest than Rohan's.", "Amit's pencil is more long than Rohan's."],
                answerIndex: 0,
                hint: "Since you are comparing exactly two distinct objects, choose the comparative form ending in '-er'."
            },
            {
                type: "Competency Text MCQ",
                context: "Scenario: There are three birthday cakes on a shelf. The first is large, the second is larger, and the third one is the biggest of all.",
                question: "If you want to describe the third cake by comparing it to all the other cakes, which word is correct?",
                options: ["largest", "large", "larger", "more large"],
                answerIndex: 0,
                hint: "Since you are comparing three cakes total to find the one with the biggest size, you need the superlative form ending in '-est'."
            },
            {
                type: "Competency Text MCQ",
                context: "Scenario: An elephant weighs 4,000 kilograms, while a field mouse weighs only 20 grams.",
                question: "Which comparative statement accurately describes what we know about these two animals?",
                options: ["The elephant is bigger than the mouse.", "The elephant is smaller than the mouse.", "The elephant is smallest than the mouse.", "The elephant is bigest than the mouse."],
                answerIndex: 0,
                hint: "The elephant is much larger. Double the final consonant 'g' in big before adding '-er'."
            }
        ];

        let currentQuestionIndex = 0;
        let runningScore = 0;
        let secondsLeft = 60; 
        let timerInterval = null;
        let currentAttemptNumber = 1; 
        let chosenOptionIndex = null;
        let correctOptionText = ""; 

        const splashScreen = document.getElementById('splash-screen');
        const challengeBoard = document.getElementById('challenge-board');
        const questionView = document.getElementById('question-view');
        const resultsView = document.getElementById('results-view');
        const timerDisplay = document.getElementById('timer-display');
        const progressIndicator = document.getElementById('progress-indicator');
        const contextBox = document.getElementById('context-box');
        const questionBox = document.getElementById('question-box');
        const optionsContainer = document.getElementById('options-container');
        const feedbackBox = document.getElementById('feedback-box');
        const nextSubmitBtn = document.getElementById('next-submit-btn');
        const scoreDisplay = document.getElementById('score-display');
        const finalScoreText = document.getElementById('final-score-text');
        const finalMessageText = document.getElementById('final-message-text');

        const audioCorrect = document.getElementById('audio-correct');
        const audioWrong = document.getElementById('audio-wrong');

        function playSound(isCorrect) {
            try {
                if (isCorrect) {
                    audioCorrect.currentTime = 0;
                    audioCorrect.play().catch(()=>{});
                } else {
                    audioWrong.currentTime = 0;
                    audioWrong.play().catch(()=>{});
                }
            } catch(e) {}
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            shuffleArray(questionsDataset);
            
            setTimeout(() => {
                splashScreen.style.opacity = '0';
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                    challengeBoard.style.display = 'block';
                    loadQuestion();
                }, 500);
            }, 5000);
        });

        function loadQuestion() {
            clearInterval(timerInterval);
            secondsLeft = 60;
            currentAttemptNumber = 1;
            chosenOptionIndex = null;
            
            feedbackBox.style.display = 'none';
            nextSubmitBtn.disabled = true;
            nextSubmitBtn.textContent = "Submit Answer";

            const q = questionsDataset[currentQuestionIndex];
            correctOptionText = q.options[q.answerIndex];
            
            shuffleArray(q.options);
            
            const progressPercent = ((currentQuestionIndex) / questionsDataset.length) * 100;
            progressIndicator.style.width = `${progressPercent}%`;
            
            contextBox.innerHTML = `<strong>Context:</strong> ${q.context}`;
            questionBox.textContent = `${currentQuestionIndex + 1}. ${q.question}`;

            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => selectOption(idx);
                optionsContainer.appendChild(btn);
            });

            timerDisplay.textContent = secondsLeft;
            timerInterval = setInterval(handleCountdown, 1000);
        }

        function handleCountdown() {
            secondsLeft--;
            timerDisplay.textContent = secondsLeft;
            if (secondsLeft <= 0) {
                clearInterval(timerInterval);
                evaluateAnswer(true);
            }
        }

        function selectOption(index) {
            if (nextSubmitBtn.textContent === "Next Question" || nextSubmitBtn.textContent === "View Results") return;
            
            chosenOptionIndex = index;
            const buttons = optionsContainer.querySelectorAll('.option-btn');
            buttons.forEach((btn, idx) => {
                btn.style.borderColor = (idx === index) ? 'var(--primary)' : '#E2E8F0';
                btn.style.backgroundColor = (idx === index) ? '#F0F4F8' : 'var(--white)';
            });
            nextSubmitBtn.disabled = false;
        }

        nextSubmitBtn.onclick = () => {
            if (nextSubmitBtn.textContent === "Submit Answer") {
                evaluateAnswer(false);
            } else {
                currentQuestionIndex++;
                if (currentQuestionIndex < questionsDataset.length) {
                    loadQuestion();
                } else {
                    displayFinalResults();
                }
            }
        };

        function evaluateAnswer(isTimeout) {
            clearInterval(timerInterval);
            const buttons = optionsContainer.querySelectorAll('.option-btn');

            if (isTimeout) {
                playSound(false);
                buttons.forEach(btn => {
                    btn.disabled = true;
                    if (btn.textContent === correctOptionText) {
                        btn.classList.add('selected-correct');
                    }
                });
                feedbackBox.style.display = 'block';
                feedbackBox.style.backgroundColor = 'var(--wrong-bg)';
                feedbackBox.style.color = 'var(--wrong-text)';
                feedbackBox.innerHTML = `<strong>Time's Up!</strong> The correct answer was: <em>${correctOptionText}</em>.`;
                prepareNextActionState();
                return;
            }

            const isCorrect = (buttons[chosenOptionIndex].textContent === correctOptionText);

            if (isCorrect) {
                playSound(true);
                buttons[chosenOptionIndex].classList.add('selected-correct');
                buttons.forEach(btn => btn.disabled = true);
                
                runningScore++;
                scoreDisplay.textContent = `Score: ${runningScore}`;

                feedbackBox.style.display = 'block';
                feedbackBox.style.backgroundColor = 'var(--correct-bg)';
                feedbackBox.style.color = 'var(--correct-text)';
                feedbackBox.innerHTML = `<strong>Correct!</strong> Perfect comparison evaluation.`;
                prepareNextActionState();
            } else {
                playSound(false);
                buttons[chosenOptionIndex].classList.add('selected-wrong');

                if (currentAttemptNumber === 1) {
                    currentAttemptNumber = 2;
                    feedbackBox.style.display = 'block';
                    feedbackBox.style.backgroundColor = '#FFFDF5';
                    feedbackBox.style.color = '#B7791F';
                    feedbackBox.innerHTML = `<strong>Not quite right!</strong> Hint: ${questionsDataset[currentQuestionIndex].hint} <br><em>Try one more time!</em>`;
                    
                    buttons[chosenOptionIndex].style.opacity = '0.6';
                    nextSubmitBtn.disabled = true;
                    
                    secondsLeft = 30; 
                    timerDisplay.textContent = secondsLeft;
                    timerInterval = setInterval(handleCountdown, 1000);
                } else {
                    buttons.forEach(btn => {
                        btn.disabled = true;
                        if (btn.textContent === correctOptionText) {
                            btn.classList.add('selected-correct');
                        }
                    });
                    
                    feedbackBox.style.display = 'block';
                    feedbackBox.style.backgroundColor = 'var(--wrong-bg)';
                    feedbackBox.style.color = 'var(--wrong-text)';
                    feedbackBox.innerHTML = `<strong>Incorrect.</strong> The correct answer was: <strong>${correctOptionText}</strong>.`;
                    prepareNextActionState();
                }
            }
        }

        function prepareNextActionState() {
            if (currentQuestionIndex < questionsDataset.length - 1) {
                nextSubmitBtn.textContent = "Next Question";
            } else {
                nextSubmitBtn.textContent = "View Results";
            }
            nextSubmitBtn.disabled = false;
        }

        function displayFinalResults() {
            questionView.style.display = 'none';
            resultsView.style.display = 'block';
            
            const totalQuestions = questionsDataset.length;
            finalScoreText.textContent = `${runningScore} / ${totalQuestions}`;
            
            const successPercentage = (runningScore / totalQuestions) * 100;
            
            if (successPercentage >= 75) {
                finalMessageText.textContent = "Outstanding! You have mastered adjectives and comparison structural mechanics! ⭐";
                finalMessageText.style.color = 'var(--correct-text)';
            } else if (successPercentage >= 40) {
                finalMessageText.textContent = "Review this chapter and try again.";
                finalMessageText.style.color = '#B7791F';
            } else {
                finalMessageText.textContent = "Let's practise more.";
                finalMessageText.style.color = 'var(--wrong-text)';
            }
            
            progressIndicator.style.width = `100%`;
        }
    </script>
</body>
</html>
