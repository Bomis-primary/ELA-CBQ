<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Grade 3 - Antonyms Interactive Quiz</title>
  <style>
    :root {
      --primary: #5c8d76;
      --primary-dark: #3e6352;
      --secondary: #e8a598;
      --bg-color: #f6f3ed;
      --card-bg: rgba(255, 255, 255, 0.92);
      --text-color: #333333;
      --correct: #4CAF50;
      --wrong: #f44336;
      --accent: #d87070;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(135deg, #fceade 0%, #e8f3ee 100%);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Floral Background Animation Layer */
    .floral-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      background: var(--secondary);
      border-radius: 15px 0px 15px 0px;
      opacity: 0.3;
      animation: floatPetal 12s infinite linear;
    }

    @keyframes floatPetal {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% {
        transform: translateY(105vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Main Container */
    .app-container {
      width: 90%;
      max-width: 650px;
      min-height: 520px;
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      border: 2px solid #ffffff;
      padding: 24px;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Logo Overlay (5s splash screen) */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    #splash-screen img {
      max-width: 220px;
      max-height: 120px;
      object-fit: contain;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Header & Stats */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 2px dashed #e2e8f0;
      margin-bottom: 15px;
    }

    .badge {
      background: var(--primary);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .timer-box, .score-box {
      font-weight: bold;
      font-size: 1rem;
      color: var(--primary-dark);
    }

    .timer-low {
      color: var(--wrong) !important;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Scenario Card */
    .scenario-box {
      background: #f4f8f5;
      border-left: 4px solid var(--primary);
      padding: 12px 15px;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #4a5568;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    /* Question & Options */
    .question-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .option-btn {
      background: #ffffff;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: left;
      font-size: 0.95rem;
      color: #2d3748;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: #f7faf8;
    }

    .option-btn.correct {
      background: #e8f5e9 !important;
      border-color: var(--correct) !important;
      color: #2e7d32 !important;
      font-weight: bold;
    }

    .option-btn.wrong {
      background: #ffebee !important;
      border-color: var(--wrong) !important;
      color: #c62828 !important;
    }

    /* Feedback & Explanation */
    .feedback-container {
      min-height: 48px;
      margin-top: 5px;
    }

    .feedback-text {
      padding: 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .feedback-text.retry {
      background: #fff8e1;
      color: #b78103;
      border: 1px solid #ffe082;
    }

    .feedback-text.explain {
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
    }

    /* Action Buttons */
    .action-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
      margin-top: 10px;
    }

    .action-btn:hover {
      background: var(--primary-dark);
    }

    /* Intro & Result Screens */
    .screen-content {
      text-align: center;
      padding: 20px 10px;
    }

    .screen-title {
      font-size: 1.8rem;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }

    .screen-subtitle {
      font-size: 1rem;
      color: #666;
      margin-bottom: 25px;
    }

    .result-score {
      font-size: 3rem;
      font-weight: bold;
      color: var(--primary);
      margin: 20px 0;
    }

    /* Star Confetti Canvas */
    #canvas-fx {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 999;
    }

    /* Wrong Cross Overlay Indicator */
    .wrong-cross {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8rem;
      color: rgba(244, 67, 54, 0.4);
      pointer-events: none;
      z-index: 100;
      display: none;
      animation: popIn 0.3s ease-out;
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Floating Floral Background -->
  <div class="floral-bg" id="floral-bg"></div>

  <!-- Star FX Canvas -->
  <canvas id="canvas-fx"></canvas>

  <!-- Red Cross Visual Overlay -->
  <div class="wrong-cross" id="wrong-cross">❌</div>

  <!-- Mandatory 5s Logo Splash -->
  <div id="splash-screen">
    <img src="assets/innovine-logo.png" alt="Innovine Logo" id="logo-img" />
  </div>

  <!-- Main Interactive App Container -->
  <div class="app-container">

    <!-- INTRO SCREEN -->
    <div id="intro-screen" class="screen-content">
      <h1 class="screen-title">Grade 3 English</h1>
      <p class="screen-subtitle">Topic: Antonyms (Words with Opposite Meanings)</p>
      <p style="margin-bottom: 20px; font-size: 0.95rem; color: #555;">
        • 16 Competency-Based Questions<br>
        • 60 Seconds per Question<br>
        • 1 Retry per Question if you make a mistake
      </p>
      <button class="action-btn" style="align-self: center;" onclick="quizApp.startQuiz()">Start Interactive</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="hidden">
      <div class="quiz-header">
        <span class="badge" id="q-counter">Q 1/16</span>
        <span class="timer-box" id="timer-text">⏱️ 60s</span>
        <span class="score-box" id="score-text">Score: 0</span>
      </div>

      <div class="scenario-box" id="scenario-text">
        <!-- Dynamic Scenario Content -->
      </div>

      <div class="question-title" id="question-text">
        <!-- Question content -->
      </div>

      <div class="options-grid" id="options-container">
        <!-- 4 Options -->
      </div>

      <div class="feedback-container" id="feedback-container">
        <!-- Hints/Explanations on retries -->
      </div>

      <button class="action-btn hidden" id="next-btn" onclick="quizApp.nextQuestion()">Next Question</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen-content hidden">
      <h1 class="screen-title">Challenge Complete! 🌸</h1>
      <p class="screen-subtitle">Great job completing the Antonyms Chapter Quiz!</p>
      <div class="result-score" id="final-score">0 / 16</div>
      <p id="result-message" style="margin-bottom: 25px; color: #4a5568;"></p>
      <button class="action-btn" style="align-self: center;" onclick="quizApp.restartQuiz()">Try Again</button>
    </div>

  </div>

  <script>
    // Audio Objects (Loaded from assets/)
    const soundCorrect = new Audio('assets/correct.mp3');
    const soundWrong = new Audio('assets/wrong.mp3');

    function playSound(audio) {
      audio.currentTime = 0;
      audio.play().catch(() => {/* Audio play blocked by browser policy until interaction */});
    }

    // Questions Data Array
    const questionsData = [
      {
        scenario: "Scenario 1: Sports Day at School\nDuring Sports Day, different races were organised for students. In one race, Aarush ran very fast and crossed the finish line first. Another participant moved slowly but completed the race with determination. The coach praised both students for their effort and sportsmanship.",
        question: "1. Which word from the lesson is the opposite of fast?",
        options: ["finish", "heavy", "slow", "healthy"],
        answer: 2,
        explanation: "'Slow' means moving with low speed, which is the exact opposite (antonym) of 'fast'."
      },
      {
        scenario: "Scenario 1: Sports Day at School",
        question: "2. Why are fast and slow considered antonyms?",
        options: ["They describe the same speed.", "They describe opposite speeds.", "They describe places.", "They describe feelings."],
        answer: 1,
        explanation: "Words are antonyms when they express completely opposite qualities—in this case, opposite rates of speed."
      },
      {
        scenario: "Scenario 1: Sports Day at School",
        question: "3. Statement: 'slow' is an antonym of 'fast.'\nReason: Antonyms are words with opposite meanings.",
        options: [
          "Both are correct and the reason explains the statement.",
          "Both are correct but not related.",
          "Statement is correct, reason is wrong.",
          "Statement is wrong, reason is correct."
        ],
        answer: 0,
        explanation: "Antonyms are defined as words with opposite meanings, which directly explains why 'slow' is the antonym of 'fast'."
      },
      {
        scenario: "Scenario 1: Sports Day at School",
        question: "4. Which sentence best matches the opposite idea of the passage?",
        options: [
          "Aarush ran slowly and reached the finish line much later.",
          "Aarush ran quickly and reached first.",
          "Aarush ran carefully and reached first.",
          "Aarush ran confidently and reached first."
        ],
        answer: 0,
        explanation: "The passage states Aarush ran fast and finished first. Running slowly and reaching later gives the opposite idea."
      },
      {
        scenario: "Scenario 2: The Community Health Camp\nA health camp was organised in a nearby community centre. Doctors checked children's health and gave useful advice. One child had been sick for a few days, but after treatment and rest, he became healthy again. His parents were relieved to see his improvement.",
        question: "5. Which word is the opposite of sick?",
        options: ["healthy", "boring", "empty", "outside"],
        answer: 0,
        explanation: "'Sick' means in poor health, whereas 'healthy' means in good physical condition—making them antonyms."
      },
      {
        scenario: "Scenario 2: The Community Health Camp",
        question: "6. Why can 'healthy' replace the condition of the child after treatment?",
        options: [
          "It shows the opposite of being sick.",
          "It shows where he was treated.",
          "It shows how he walked.",
          "It shows when he visited the doctor."
        ],
        answer: 0,
        explanation: "After receiving treatment, the child recovered from being sick, reaching the opposite state: healthy."
      },
      {
        scenario: "Scenario 2: The Community Health Camp",
        question: "7. Which pair does NOT show opposite meanings?",
        options: ["sick – healthy", "fast – slow", "empty – full", "healthy – doctor"],
        answer: 3,
        explanation: "'Healthy' describes a physical state while 'doctor' is a profession. They are not opposite meanings."
      },
      {
        scenario: "Scenario 2: The Community Health Camp",
        question: "8. A student says: 'Healthy is an antonym of full.' Which word/statement shows incorrect understanding?",
        options: ["healthy", "antonym", "full", "healthy is an antonym of full"],
        answer: 3,
        explanation: "The entire statement is incorrect because 'healthy' is the antonym of 'sick', while 'full' is the antonym of 'empty'."
      },
      {
        scenario: "Scenario 3: The School Reading Corner\nThe school library introduced a new reading corner with storybooks and magazines. Some students found a science magazine very interesting and eagerly discussed it with their friends. A few students picked another magazine but felt it was boring because it did not match their interests.",
        question: "9. Which word from the lesson is the opposite of interesting?",
        options: ["healthy", "boring", "heavy", "inside"],
        answer: 1,
        explanation: "'Interesting' catches your attention, while 'boring' fails to hold interest, making them antonyms."
      },
      {
        scenario: "Scenario 3: The School Reading Corner",
        question: "10. Statement: 'boring' is an antonym of 'interesting.'\nReason: The two words express opposite opinions about something.",
        options: [
          "Both are correct and the reason explains the statement.",
          "Both are correct but not related.",
          "Statement is correct, reason is wrong.",
          "Statement is wrong, reason is correct."
        ],
        answer: 0,
        explanation: "Because they convey opposite feelings/opinions about an item, the reason correctly justifies why they are antonyms."
      },
      {
        scenario: "Scenario 3: The School Reading Corner",
        question: "11. Why might one student describe a magazine as boring?",
        options: [
          "Because it did not interest them.",
          "Because it was very healthy.",
          "Because it was full.",
          "Because it was fast."
        ],
        answer: 0,
        explanation: "If something fails to arouse interest or curiosity in a person, they describe it as boring."
      },
      {
        scenario: "Scenario 3: The School Reading Corner",
        question: "12. Which sentence best shows the opposite meaning of the passage?",
        options: [
          "The students found the magazine interesting.",
          "The students found the magazine exciting.",
          "The students found the magazine boring.",
          "The students found the magazine useful."
        ],
        answer: 2,
        explanation: "The passage highlights students finding the magazine very interesting. Saying they found it boring gives the opposite scenario."
      },
      {
        scenario: "Scenario 4: Preparing for a Train Journey\nA family was preparing for a train journey during the holidays. They packed their bags the night before and checked their tickets carefully. One suitcase was full of clothes and books, while another suitcase was completely empty and waiting to be packed. The children sat inside the train while their grandparents waved from outside.",
        question: "13. Which pair of words from the passage are antonyms?",
        options: ["train – suitcase", "inside – outside", "books – clothes", "children – grandparents"],
        answer: 1,
        explanation: "'Inside' and 'outside' express opposite position/location, making them an antonym pair."
      },
      {
        scenario: "Scenario 4: Preparing for a Train Journey",
        question: "14. Why are empty and full antonyms?",
        options: [
          "They describe opposite amounts.",
          "They describe opposite places.",
          "They describe opposite people.",
          "They describe opposite actions."
        ],
        answer: 0,
        explanation: "'Full' means containing as much as possible, while 'empty' means containing nothing—they represent opposite amounts."
      },
      {
        scenario: "Scenario 4: Preparing for a Train Journey",
        question: "15. Which pair does NOT belong with the others?",
        options: ["inside – outside", "front – back", "start – finish", "inside – train"],
        answer: 3,
        explanation: "All other choices are pairs of opposite words (antonyms). 'Inside – train' is a location relationship, not antonyms."
      },
      {
        scenario: "Scenario 4: Preparing for a Train Journey",
        question: "16. Which statement best explains antonyms?",
        options: [
          "Antonyms are words that sound alike.",
          "Antonyms are words that have opposite meanings.",
          "Antonyms are words that are spelled the same.",
          "Antonyms are words used only in stories."
        ],
        answer: 1,
        explanation: "By definition, antonyms are words that express opposite meanings."
      }
    ];

    // Quiz Application State & Logic
    class QuizApp {
      constructor() {
        this.currentQ = 0;
        this.score = 0;
        this.timer = null;
        this.timeLeft = 60; // 60s for Grade 3
        this.attempts = 0;
        this.initFloralBg();
      }

      initFloralBg() {
        const bg = document.getElementById('floral-bg');
        for (let i = 0; i < 12; i++) {
          const petal = document.createElement('div');
          petal.className = 'petal';
          petal.style.width = Math.random() * 15 + 10 + 'px';
          petal.style.height = Math.random() * 20 + 15 + 'px';
          petal.style.left = Math.random() * 100 + '%';
          petal.style.animationDelay = Math.random() * 10 + 's';
          petal.style.animationDuration = Math.random() * 6 + 8 + 's';
          bg.appendChild(petal);
        }
      }

      startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        this.currentQ = 0;
        this.score = 0;
        this.loadQuestion();
      }

      loadQuestion() {
        this.attempts = 0;
        this.timeLeft = 60;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback-container').innerHTML = '';
        
        const qData = questionsData[this.currentQ];
        document.getElementById('q-counter').innerText = `Q ${this.currentQ + 1}/${questionsData.length}`;
        document.getElementById('score-text').innerText = `Score: ${this.score}`;
        document.getElementById('scenario-text').innerText = qData.scenario;
        document.getElementById('question-text').innerText = qData.question;

        const optionsBox = document.getElementById('options-container');
        optionsBox.innerHTML = '';

        qData.options.forEach((optText, idx) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerText = `${String.fromCharCode(65 + idx)}) ${optText}`;
          btn.onclick = () => this.handleAnswer(idx);
          optionsBox.appendChild(btn);
        });

        this.startTimer();
      }

      startTimer() {
        clearInterval(this.timer);
        const timerElem = document.getElementById('timer-text');
        timerElem.classList.remove('timer-low');
        timerElem.innerText = `⏱️ ${this.timeLeft}s`;

        this.timer = setInterval(() => {
          this.timeLeft--;
          timerElem.innerText = `⏱️ ${this.timeLeft}s`;

          if (this.timeLeft <= 10) {
            timerElem.classList.add('timer-low');
          }

          if (this.timeLeft <= 0) {
            clearInterval(this.timer);
            this.handleTimeout();
          }
        }, 1000);
      }

      handleAnswer(selectedIndex) {
        const qData = questionsData[this.currentQ];
        const buttons = document.querySelectorAll('.option-btn');

        if (selectedIndex === qData.answer) {
          // Correct Answer
          clearInterval(this.timer);
          playSound(soundCorrect);
          triggerStarFX();
          
          buttons[selectedIndex].classList.add('correct');
          this.disableOptions();
          
          if (this.attempts === 0) {
            this.score += 10;
          } else {
            this.score += 5; // Partial points on retry
          }
          document.getElementById('score-text').innerText = `Score: ${this.score}`;
          
          document.getElementById('feedback-container').innerHTML = `
            <div class="feedback-text explain">✨ Correct! ${qData.explanation}</div>
          `;
          document.getElementById('next-btn').classList.remove('hidden');

        } else {
          // Wrong Answer
          this.attempts++;
          playSound(soundWrong);
          showWrongCross();

          buttons[selectedIndex].classList.add('wrong');
          buttons[selectedIndex].disabled = true;

          if (this.attempts === 1) {
            // First Wrong Attempt -> Retry opportunity
            document.getElementById('feedback-container').innerHTML = `
              <div class="feedback-text retry">💡 Not quite right! Give it one more try.</div>
            `;
          } else {
            // Second Wrong Attempt -> Reveal answer & explanation
            clearInterval(this.timer);
            this.disableOptions();
            buttons[qData.answer].classList.add('correct');

            document.getElementById('feedback-container').innerHTML = `
              <div class="feedback-text explain"><b>Correct Answer: ${String.fromCharCode(65 + qData.answer)}) ${qData.options[qData.answer]}</b><br>${qData.explanation}</div>
            `;
            document.getElementById('next-btn').classList.remove('hidden');
          }
        }
      }

      handleTimeout() {
        playSound(soundWrong);
        showWrongCross();
        this.disableOptions();
        
        const qData = questionsData[this.currentQ];
        const buttons = document.querySelectorAll('.option-btn');
        buttons[qData.answer].classList.add('correct');

        document.getElementById('feedback-container').innerHTML = `
          <div class="feedback-text retry">⏰ Time's up! The correct answer was <b>${String.fromCharCode(65 + qData.answer)}) ${qData.options[qData.answer]}</b>.</div>
        `;
        document.getElementById('next-btn').classList.remove('hidden');
      }

      disableOptions() {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);
      }

      nextQuestion() {
        this.currentQ++;
        if (this.currentQ < questionsData.length) {
          this.loadQuestion();
        } else {
          this.showResults();
        }
      }

      showResults() {
        clearInterval(this.timer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        const maxScore = questionsData.length * 10;
        document.getElementById('final-score').innerText = `${this.score} / ${maxScore}`;

        let msg = "";
        const percentage = (this.score / maxScore) * 100;
        if (percentage >= 80) {
          msg = "🌟 Outstanding! You have mastered Antonyms!";
          triggerStarFX();
        } else if (percentage >= 50) {
          msg = "👍 Good Effort! Keep practicing to improve your score further.";
        } else {
          msg = "📘 Keep Learning! Review the scenarios and try again.";
        }
        document.getElementById('result-message').innerText = msg;
      }

      restartQuiz() {
        document.getElementById('result-screen').classList.add('hidden');
        this.startQuiz();
      }
    }

    // Star Confetti Canvas FX
    const canvas = document.getElementById('canvas-fx');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function triggerStarFX() {
      for (let i = 0; i < 35; i++) {
        stars.push({
          x: window.innerWidth / 2,
          y: window.innerHeight / 2,
          size: Math.random() * 8 + 4,
          color: `hsl(${Math.random() * 60 + 40}, 100%, 60%)`,
          vx: (Math.random() - 0.5) * 12,
          vy: (Math.random() - 0.5) * 12,
          life: 1
        });
      }
    }

    function drawStar(x, y, radius, color) {
      ctx.beginPath();
      ctx.fillStyle = color;
      for (let i = 0; i < 5; i++) {
        ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * radius + x,
                   -Math.sin((18 + i * 72) * Math.PI / 180) * radius + y);
        ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (radius / 2) + x,
                   -Math.sin((54 + i * 72) * Math.PI / 180) * (radius / 2) + y);
      }
      ctx.closePath();
      ctx.fill();
    }

    function animateFX() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach((s, idx) => {
        s.x += s.vx;
        s.y += s.vy;
        s.life -= 0.025;
        if (s.life <= 0) {
          stars.splice(idx, 1);
        } else {
          ctx.globalAlpha = s.life;
          drawStar(s.x, s.y, s.size, s.color);
        }
      });
      requestAnimationFrame(animateFX);
    }
    animateFX();

    // Red Cross Visual Flash Logic
    function showWrongCross() {
      const cross = document.getElementById('wrong-cross');
      cross.style.display = 'block';
      setTimeout(() => {
        cross.style.display = 'none';
      }, 600);
    }

    // Initialize App & Handle Mandatory 5s Logo Splash
    const quizApp = new QuizApp();

    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
      }, 5000); // Display Innovine logo for 5s
    });
  </script>
